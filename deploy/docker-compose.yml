# Prism Production Deployment Configuration
# 
# This docker-compose file provides a production-ready deployment for Prism
# with enterprise-grade security features enabled.
#
# Usage:
#   docker-compose up -d     # Start services
#   docker-compose logs -f   # View logs
#   docker-compose down      # Stop services

version: '3.8'

services:
  # Prism Daemon - Main service
  prismd:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.prismd
    container_name: prism-daemon
    restart: unless-stopped
    ports:
      - "8947:8947"  # CWS API port
    environment:
      - CWS_PORT=8947
      - CWS_LOG_LEVEL=info
      - CWS_SECURITY_ENABLED=true
      - CWS_AUDIT_ENABLED=true
      - CWS_MONITORING_ENABLED=true
      - CWS_CORRELATION_ENABLED=true
      - CWS_REGISTRY_SECURITY_ENABLED=true
      - AWS_REGION=${AWS_REGION:-us-west-2}
      - AWS_PROFILE=${AWS_PROFILE:-default}
    volumes:
      - prism_data:/data
      - prism_logs:/var/log/prism
      - prism_security:/var/lib/prism/security
      - ~/.aws:/root/.aws:ro  # AWS credentials (read-only)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8947/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - prism
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

  # Security Monitor - Dedicated security monitoring service
  prism-security-monitor:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.security-monitor
    container_name: prism-security-monitor
    restart: unless-stopped
    depends_on:
      - prismd
    environment:
      - CWS_DAEMON_URL=http://prismd:8947
      - CWS_MONITOR_INTERVAL=30s
      - CWS_CORRELATION_INTERVAL=5m
      - CWS_ALERT_THRESHOLD=MEDIUM
    volumes:
      - prism_security:/var/lib/prism/security:ro
      - prism_logs:/var/log/prism
    networks:
      - prism
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m

  # Log Aggregator - Centralized logging
  log-aggregator:
    image: fluent/fluentd:v1.16-debian-1
    container_name: prism-logs
    restart: unless-stopped
    volumes:
      - prism_logs:/var/log/prism
      - ./fluentd.conf:/fluentd/etc/fluent.conf:ro
    networks:
      - prism
    security_opt:
      - no-new-privileges:true

  # Metrics Exporter - Prometheus metrics
  metrics-exporter:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.metrics
    container_name: prism-metrics
    restart: unless-stopped
    depends_on:
      - prismd
    ports:
      - "9090:9090"
    environment:
      - CWS_DAEMON_URL=http://prismd:8947
      - METRICS_PORT=9090
    networks:
      - prism
    security_opt:
      - no-new-privileges:true
    read_only: true

networks:
  prism:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    driver_opts:
      com.docker.network.bridge.name: prism-br0

volumes:
  prism_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/prism/data
  prism_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/prism/logs
  prism_security:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/prism/security