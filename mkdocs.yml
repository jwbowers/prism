site_name: Prism
site_url: https://prismcloud.io
site_description: Cloud research workstations for scientists — launch in seconds, not hours.
site_author: Scott Friedman

repo_url: https://github.com/scttfrdmn/prism
repo_name: scttfrdmn/prism
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2025-2026 Scott Friedman and Prism Contributors

# Custom domain configuration for GitHub Pages
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

  custom_dir: docs/overrides
  logo: images/prism-icon-transparent.png
  favicon: images/prism-icon.png

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - minify:
      minify_html: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/scttfrdmn/prism
    - icon: fontawesome/solid/comments
      link: https://github.com/scttfrdmn/prism/discussions

  version:
    provider: mike
    default: latest

nav:
  - Home: index.md

  - Getting Started: user-guides/QUICK_START.md

  - User Guide:
    - CLI Reference: user-guides/CLI_REFERENCE.md
    - GUI Guide: user-guides/GUI_USER_GUIDE.md
    - Workspace Lifecycle: user-guides/WORKSPACE_LIFECYCLE.md
    - Templates: user-guides/TEMPLATE_FORMAT.md
    - Templates (Advanced): user-guides/TEMPLATE_FORMAT_ADVANCED.md
    - Profiles & Credentials: user-guides/MULTI_PROFILE_GUIDE.md
    - Courses: user-guides/COURSES_GUIDE.md
    - Workshops: user-guides/WORKSHOPS_GUIDE.md
    - Approvals: user-guides/APPROVALS_GUIDE.md
    - Invitations: user-guides/INVITATION_USER_GUIDE.md
    - Troubleshooting: user-guides/TROUBLESHOOTING.md

  - Administrator Guide:
    - Overview: admin-guides/ADMINISTRATOR_GUIDE.md
    - IAM & AWS Permissions: admin-guides/AWS_IAM_PERMISSIONS.md
    - Security Hardening: admin-guides/SECURITY_HARDENING_GUIDE.md
    - Template Policy: admin-guides/TEMPLATE_POLICY_FRAMEWORK.md
    - Research User Management: admin-guides/RESEARCH_USER_MANAGEMENT_GUIDE.md

  - Architecture:
    - API Reference: architecture/DAEMON_API_REFERENCE.md
    - spored Daemon: architecture/SPORED_DAEMON.md
    - Idle Detection: architecture/AUTONOMOUS_IDLE_DETECTION.md
    - GUI Architecture: architecture/GUI_ARCHITECTURE.md
    - SSH Keys: architecture/ARCHITECTURE_SSH_KEYS.md
    - Research Users: architecture/RESEARCH_USER_ARCHITECTURE.md

  - Release Notes: releases/RELEASE_NOTES.md
