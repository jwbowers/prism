name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies
        run: |
          go mod download
          go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -d .
            exit 1
          fi

      - name: Build CLI
        run: go build -o bin/prism ./cmd/prism

      - name: Build Daemon
        run: go build -o bin/prismd ./cmd/prismd

      - name: Verify binaries
        run: |
          ./bin/prism --version
          ./bin/prismd --version

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies
        run: |
          go mod download
          go mod verify

      - name: Run unit tests
        run: |
          PRISM_DEV=true GO_ENV=test go test -short -timeout 5m \
            $(go list ./... | grep -v -E "(cmd/prism-gui|internal/tui)") \
            -coverprofile=unit-coverage.out \
            -covermode=atomic

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./unit-coverage.out
          flags: unit
          name: unit-tests
        continue-on-error: true

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [lint-and-build, unit-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.lint-and-build.result }}" != "success" ]; then
            echo "❌ Lint and build failed"
            exit 1
          fi
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "❌ Unit tests failed"
            exit 1
          fi
          echo "✅ All checks passed!"
