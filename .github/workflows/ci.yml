name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies
        run: |
          go mod download
          go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -d .
            exit 1
          fi

      - name: Build CLI
        run: go build -o bin/prism ./cmd/prism

      - name: Build Daemon
        run: go build -o bin/prismd ./cmd/prismd

      - name: Verify binaries
        run: |
          ./bin/prism --version
          ./bin/prismd --version

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: prism-binaries
          path: |
            bin/prism
            bin/prismd
          retention-days: 1

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies
        run: |
          go mod download
          go mod verify

      - name: Run unit tests
        run: |
          PRISM_DEV=true GO_ENV=test go test -race -short \
            $(go list ./... | grep -v -E "(cmd/prism-gui|internal/tui)") \
            -coverprofile=unit-coverage.out \
            -covermode=atomic \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./unit-coverage.out
          flags: unit
          name: unit-tests
        continue-on-error: true

  integration-tests:
    name: Integration Tests (LocalStack)
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies
        run: |
          go mod download
          go mod verify

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: prism-binaries
          path: bin

      - name: Make binaries executable
        run: chmod +x bin/prism bin/prismd

      - name: Start LocalStack
        run: |
          cd test/localstack
          docker compose up -d
          echo "⏳ Waiting for LocalStack to be ready..."
          timeout 120 bash -c 'until curl -f http://localhost:4566/_localstack/health 2>/dev/null; do sleep 3; done' || (echo "❌ LocalStack failed to start" && exit 1)
          echo "⏳ Waiting for init scripts to complete..."
          timeout 90 bash -c 'until [ -f /tmp/localstack/prism-init-complete ]; do sleep 3; done' || (echo "❌ LocalStack init scripts did not complete" && exit 1)

      - name: Run LocalStack integration tests
        run: |
          PRISM_DEV=true GO_ENV=test go test -v -tags integration \
            ./test/localstack/... \
            -coverprofile=integration-coverage.out \
            -covermode=atomic \
            -timeout 10m

      - name: Stop LocalStack
        if: always()
        run: |
          cd test/localstack
          docker compose down -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./integration-coverage.out
          flags: integration
          name: integration-tests
        continue-on-error: true

  cli-integration-tests:
    name: CLI Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies
        run: |
          go mod download
          go mod verify

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: prism-binaries
          path: bin

      - name: Make binaries executable
        run: chmod +x bin/prism bin/prismd

      - name: Start LocalStack for CLI tests
        run: |
          cd test/localstack
          docker compose up -d
          echo "⏳ Waiting for LocalStack to be ready..."
          timeout 120 bash -c 'until curl -f http://localhost:4566/_localstack/health 2>/dev/null; do sleep 3; done' || (echo "❌ LocalStack failed to start" && exit 1)
          echo "⏳ Waiting for init scripts to complete..."
          timeout 90 bash -c 'until [ -f /tmp/localstack/prism-init-complete ]; do sleep 3; done' || (echo "❌ LocalStack init scripts did not complete" && exit 1)

      - name: Pre-start daemon in LocalStack mode for CLI tests
        run: |
          # Start daemon directly with PRISM_USE_LOCALSTACK so it initialises in
          # full LocalStack mode. CLI tests will find it already running and skip
          # auto-start, avoiding the env-var propagation issue through the
          # prism→prismd subprocess chain.
          PRISM_USE_LOCALSTACK=true AWS_PROFILE=localstack AWS_REGION=us-west-2 PRISM_DEV=true nohup ./bin/prismd > /tmp/prismd-cli-test.log 2>&1 &
          echo "⏳ Waiting for daemon to be ready..."
          timeout 30 bash -c 'until curl -sf http://localhost:8947/api/v1/ping >/dev/null 2>&1; do sleep 1; done' || (echo "❌ Daemon failed to start"; cat /tmp/prismd-cli-test.log; exit 1)
          echo "✅ Daemon started in LocalStack mode"

      - name: Run CLI integration tests
        run: |
          PRISM_DEV=true GO_ENV=test PRISM_USE_LOCALSTACK=true AWS_PROFILE=localstack go test -v -tags integration \
            ./test/integration/cli/... \
            -coverprofile=cli-coverage.out \
            -covermode=atomic \
            -timeout 15m

      - name: Stop LocalStack
        if: always()
        run: |
          cd test/localstack
          docker compose down -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cli-coverage.out
          flags: cli-integration
          name: cli-integration-tests
        continue-on-error: true

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [lint-and-build, unit-tests, integration-tests, cli-integration-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.lint-and-build.result }}" != "success" ]; then
            echo "❌ Lint and build failed"
            exit 1
          fi
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "❌ Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "❌ Integration tests failed"
            exit 1
          fi
          if [ "${{ needs.cli-integration-tests.result }}" != "success" ]; then
            echo "❌ CLI integration tests failed"
            exit 1
          fi
          echo "✅ All tests passed!"
