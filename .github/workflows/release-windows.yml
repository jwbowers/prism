name: Windows MSI Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build-msi:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install WiX Toolset
        run: choco install wixtoolset -y

      - name: Strip leading 'v' from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Build MSI
        shell: pwsh
        run: pwsh scripts/build-msi.ps1 -Version ${{ steps.version.outputs.VERSION }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/windows/Prism-*.msi
          fail_on_unmatched_files: true
