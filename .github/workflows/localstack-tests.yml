name: LocalStack Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: # Allow manual triggering

jobs:
  localstack-tests:
    name: LocalStack Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Start LocalStack
        run: |
          cd test/localstack
          docker-compose up -d
          echo "LocalStack started"

      - name: Wait for LocalStack to be ready
        run: |
          echo "Waiting for LocalStack to be healthy..."
          timeout 120 bash -c 'until curl -f http://localhost:4566/_localstack/health 2>/dev/null; do
            echo "Waiting for LocalStack...";
            sleep 3;
          done'
          echo "LocalStack is healthy"

      - name: Verify LocalStack services
        run: |
          echo "Checking LocalStack services..."
          curl -s http://localhost:4566/_localstack/health | jq .

      - name: Wait for initialization to complete
        run: |
          echo "Waiting for LocalStack initialization scripts to complete..."
          timeout 60 bash -c 'until [ -f /tmp/prism-localstack-config.json ]; do
            echo "Waiting for initialization...";
            sleep 3;
          done'
          echo "Initialization complete"
          cat /tmp/prism-localstack-config.json | jq .

      - name: Build Prism binaries
        run: |
          make build
          ls -lah bin/

      - name: Run LocalStack verification tests
        env:
          PRISM_USE_LOCALSTACK: "true"
        run: |
          go test -v -tags=integration ./test/localstack/... -timeout 10m

      - name: Run integration tests with LocalStack
        env:
          PRISM_USE_LOCALSTACK: "true"
        run: |
          # Run a subset of integration tests known to work with LocalStack
          go test -v -tags=integration ./test/integration/phase1_workflows/... -timeout 15m -run TestBasicTemplate || true
          echo "Note: Some tests may be skipped or fail due to LocalStack limitations"

      - name: Show LocalStack logs on failure
        if: failure()
        run: |
          cd test/localstack
          echo "=== LocalStack Logs ==="
          docker-compose logs localstack
          echo ""
          echo "=== LocalStack Config ==="
          cat /tmp/prism-localstack-config.json 2>/dev/null || echo "Config file not found"

      - name: Stop LocalStack
        if: always()
        run: |
          cd test/localstack
          docker-compose down -v

  localstack-performance:
    name: LocalStack Performance Comparison
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: localstack-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Start LocalStack
        run: |
          cd test/localstack
          docker-compose up -d

      - name: Wait for LocalStack
        run: |
          timeout 120 bash -c 'until curl -f http://localhost:4566/_localstack/health 2>/dev/null; do
            sleep 3;
          done'
          timeout 60 bash -c 'until [ -f /tmp/prism-localstack-config.json ]; do
            sleep 3;
          done'

      - name: Build Prism
        run: make build

      - name: Run performance test suite
        env:
          PRISM_USE_LOCALSTACK: "true"
        run: |
          echo "=== Running LocalStack performance tests ==="
          START_TIME=$(date +%s)

          go test -v -tags=integration ./test/localstack/... -timeout 10m

          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          echo ""
          echo "=== Performance Results ==="
          echo "LocalStack test suite completed in: ${DURATION} seconds"
          echo ""
          echo "Target: <5 minutes (300 seconds)"

          if [ $DURATION -lt 300 ]; then
            echo "✓ Performance target met!"
          else
            echo "⚠ Performance target not met (took ${DURATION}s, target 300s)"
          fi

      - name: Cleanup
        if: always()
        run: |
          cd test/localstack
          docker-compose down -v

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [localstack-tests, localstack-performance]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "=== LocalStack Integration Test Summary ==="
          echo ""
          echo "LocalStack Tests: ${{ needs.localstack-tests.result }}"
          echo "Performance Tests: ${{ needs.localstack-performance.result }}"
          echo ""

          if [[ "${{ needs.localstack-tests.result }}" == "success" && "${{ needs.localstack-performance.result }}" == "success" ]]; then
            echo "✓ All LocalStack tests passed"
            exit 0
          else
            echo "✗ Some LocalStack tests failed"
            exit 1
          fi
