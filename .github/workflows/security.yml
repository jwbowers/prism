name: Security Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # Weekly Monday 8am UTC — catches new CVEs

permissions:
  contents: read
  security-events: write

jobs:
  security:
    name: Vulnerability & SAST Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Go vulnerability check ---
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      # --- npm dependency audit ---
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cmd/prism-gui/frontend/package-lock.json

      - name: npm audit
        working-directory: cmd/prism-gui/frontend
        run: npm audit

      # --- Trivy filesystem scan (Go + npm deps + secrets) ---
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      # --- Trivy IaC scan (Dockerfile misconfigurations) ---
      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      # --- Semgrep SAST ---
      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
