version: '3.8'

services:
  localstack:
    image: localstack/localstack:latest
    container_name: prism-localstack
    ports:
      - "4566:4566"            # LocalStack gateway (all services)
      - "4510-4559:4510-4559"  # External service port range
    environment:
      # Core LocalStack configuration
      - SERVICES=ec2,efs,s3,ssm,iam,sts
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - LOCALSTACK_HOST=localhost:4566
      - EDGE_PORT=4566

      # AWS configuration
      - AWS_DEFAULT_REGION=us-west-2
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test

      # Performance and persistence
      - PERSISTENCE=0  # Disable persistence for clean test runs
      - LAMBDA_EXECUTOR=local
      - KINESIS_ERROR_PROBABILITY=0.0

      # EC2 configuration
      - EC2_BACKEND=mock  # Use mock backend for faster tests

    volumes:
      - "${TMPDIR:-/tmp}/localstack:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./init:/etc/localstack/init/ready.d"  # Initialization scripts

    healthcheck:
      test: ["CMD", "awslocal", "ec2", "describe-regions"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - prism-test

networks:
  prism-test:
    driver: bridge
