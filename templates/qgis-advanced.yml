# QGIS Advanced - Professional GIS Desktop Environment with Nice DCV
name: "QGIS Advanced Desktop"
slug: "qgis-advanced"
description: "Professional QGIS desktop with advanced GIS tools and database integration"
long_description: |
  Professional QGIS desktop environment with comprehensive GIS toolset including GRASS, SAGA,
  PostGIS support, and advanced geoprocessing capabilities. Accessible via Nice DCV remote desktop.

  Features:
  - QGIS LTR with extensive plugin ecosystem
  - GRASS GIS for advanced raster/vector analysis
  - SAGA GIS for terrain analysis and modeling
  - PostGIS support for spatial databases
  - GDAL/OGR with full format support
  - MATE desktop environment (performant for heavy workloads)
  - Nice DCV for browser-based remote desktop
  - No exposed ports (secure SSM port forwarding)

  Use Cases:
  - Professional GIS analysis and cartography
  - Complex geoprocessing workflows
  - Spatial database management (PostGIS)
  - Terrain analysis and 3D visualization
  - Large dataset processing
  - Research and advanced coursework

base: "ubuntu-24.04"

# Connection configuration
connection_type: "desktop"

desktop:
  environment: "mate"          # Lightweight but powerful desktop
  dcv_port: 8443              # DCV server port (HTTPS)
  dcv_version: "latest"       # Use latest DCV release
  gpu_required: false         # No GPU needed (CPU processing)
  session_type: "virtual"     # Virtual session (no physical display)
  session_user: "ubuntu"      # User for DCV session
  auth_method: "password"     # Password authentication

# Complexity and categorization
complexity: "intermediate"
category: "Desktop Environment"
domain: "gis"

# Visual presentation
icon: "🗺️"
color: "#306844"  # Darker QGIS green (advanced)
popular: true

# Package management
package_manager: "apt"
packages:
  system:
    # MATE Desktop Environment
    - ubuntu-mate-desktop
    - mate-desktop-environment

    # QGIS and core GIS tools
    - qgis
    - qgis-plugin-grass
    - python3-qgis
    - qgis-common

    # Advanced GIS software
    - grass
    - saga
    - gdal-bin
    - python3-gdal
    - libgdal-dev
    - postgis
    - postgresql-client

    # Additional geospatial tools
    - mapserver-bin
    - proj-bin
    - libproj-dev
    - spatialite-bin
    - geotiff-bin

    # Python GIS libraries
    - python3-shapely
    - python3-fiona
    - python3-rasterio
    - python3-geopandas
    - python3-pyproj

    # Essential applications
    - firefox
    - gedit
    - file-roller

    # Development tools
    - git
    - vim
    - curl
    - wget
    - build-essential
    - python3-pip
    - python3-dev

    # System utilities
    - htop
    - net-tools
    - dbus-x11  # Required for DCV
    - mesa-utils  # OpenGL utilities

# System services
services:
  - name: dcv
    port: 8443
    description: "Nice DCV remote desktop"
    protocol: "https"

# Default user
users:
  - name: ubuntu
    groups: ["sudo", "adm", "video", "render"]
    shell: "/bin/bash"

# Cloud-init user data for DCV installation
user_data: |
  #cloud-config

  # Update system
  package_update: true
  package_upgrade: true

  # Install Nice DCV dependencies
  packages:
    - mesa-utils
    - ubuntu-mate-desktop
    - dbus-x11
    - lightdm
    - qgis
    - qgis-plugin-grass
    - grass
    - saga
    - postgis

  runcmd:
    # Download and install Nice DCV server
    - wget https://d1uj6qtbmh3dt5.cloudfront.net/nice-dcv-ubuntu2404-x86_64.tgz -O /tmp/nice-dcv.tgz
    - tar -xzf /tmp/nice-dcv.tgz -C /tmp
    - apt install -y /tmp/nice-dcv-*-ubuntu2404-x86_64/*.deb

    # Configure DCV server
    - |
      cat > /etc/dcv/dcv.conf <<'EOF'
      [license]
      [log]
      level="info"
      [session-management]
      create-session = true
      [session-management/defaults]
      [session-management/automatic-console-session]
      owner="ubuntu"
      [display]
      [connectivity]
      enable-quic-frontend=true
      [security]
      authentication="system"
      EOF

    # Set password for ubuntu user (users should change this)
    - echo "ubuntu:ChangeMe123!" | chpasswd

    # Configure LightDM for automatic login
    - |
      cat > /etc/lightdm/lightdm.conf.d/50-dcv.conf <<'EOF'
      [Seat:*]
      autologin-user=ubuntu
      autologin-user-timeout=0
      EOF

    # Enable and start DCV server
    - systemctl enable dcvserver
    - systemctl start dcvserver

    # Create initial DCV session
    - sleep 10
    - sudo -u ubuntu dcv create-session --type=virtual --owner ubuntu my-session

    # Create QGIS Advanced desktop shortcuts and data directories
    - |
      mkdir -p /home/ubuntu/Desktop
      mkdir -p /home/ubuntu/GIS-Projects
      mkdir -p /home/ubuntu/GIS-Data
      mkdir -p /home/ubuntu/GIS-Scripts

      cat > /home/ubuntu/Desktop/QGIS-Advanced-Guide.txt <<'EOF'
      QGIS Advanced Desktop - Professional GIS Workstation
      =====================================================

      🗺️  Installed Software:
      - QGIS LTR (Long Term Release)
      - GRASS GIS 8.x (raster/vector analysis)
      - SAGA GIS (terrain modeling)
      - PostGIS support (spatial databases)
      - GDAL/OGR (format conversion)
      - Python GIS libraries (shapely, fiona, geopandas)

      📂 Directory Structure:
      - ~/GIS-Projects/ - Your GIS project files
      - ~/GIS-Data/     - Data storage and datasets
      - ~/GIS-Scripts/  - Python and shell scripts

      📡 Connection:
      From local machine: prism connect <instance-name>

      🔧 Advanced Features:
      1. GRASS Integration:
         - Access via Processing Toolbox → GRASS
         - Full r.* and v.* command suite
         - Integrated terrain analysis

      2. SAGA Integration:
         - Processing Toolbox → SAGA
         - Advanced terrain modeling
         - Hydrological analysis

      3. PostGIS:
         - Install PostgreSQL server if needed
         - Use DB Manager for PostGIS connections
         - Spatial database queries

      4. Python Console:
         - Full PyQGIS API available
         - Pre-installed: shapely, fiona, geopandas, rasterio
         - Script directory: ~/GIS-Scripts/

      5. GDAL Command Line:
         - ogr2ogr (vector conversion)
         - gdalwarp (raster reprojection)
         - gdal_translate (format conversion)
         - Full GDAL utilities installed

      💡 Performance Tips:
      - Use Processing Batch mode for multiple files
      - GRASS algorithms for large rasters
      - PostGIS for complex spatial queries
      - Python scripts for automation

      🔑 Security:
      Change password immediately: passwd

      📚 Resources:
      - QGIS: https://qgis.org/en/docs/
      - GRASS: https://grass.osgeo.org/
      - SAGA: https://saga-gis.org/
      - PostGIS: https://postgis.net/

      For support: https://github.com/scttfrdmn/prism/issues
      EOF

      chown -R ubuntu:ubuntu /home/ubuntu/Desktop
      chown -R ubuntu:ubuntu /home/ubuntu/GIS-*

    # Clean up
    - rm -rf /tmp/nice-dcv*

# Post-install message
post_install: |
  #!/bin/bash

  echo "========================================="
  echo "QGIS Advanced Desktop Setup Complete!"
  echo "========================================="
  echo ""
  echo "🗺️  Professional GIS Workstation Ready"
  echo ""
  echo "📡 To connect:"
  echo "   prism connect {{ .InstanceName }}"
  echo ""
  echo "🔑 Default Credentials:"
  echo "   Username: ubuntu"
  echo "   Password: ChangeMe123!"
  echo "   ⚠️  IMPORTANT: Change this password immediately!"
  echo ""
  echo "🗺️  Advanced GIS Tools Installed:"
  echo "   - QGIS LTR with full plugin support"
  echo "   - GRASS GIS (r.*, v.* commands)"
  echo "   - SAGA GIS (terrain modeling)"
  echo "   - PostGIS support"
  echo "   - GDAL/OGR complete toolset"
  echo "   - Python GIS libraries (geopandas, shapely, fiona)"
  echo ""
  echo "📂 Project Directories:"
  echo "   - ~/GIS-Projects/ (project files)"
  echo "   - ~/GIS-Data/ (datasets)"
  echo "   - ~/GIS-Scripts/ (automation scripts)"
  echo ""
  echo "🔒 Security:"
  echo "   - No exposed ports (SSM tunneling)"
  echo "   - Browser-based access"
  echo "   - SSL encrypted connection"
  echo ""
  echo "📚 Documentation:"
  echo "   - Advanced guide on desktop"
  echo "   - QGIS: https://qgis.org/en/docs/"
  echo "   - GRASS: https://grass.osgeo.org/"
  echo "   - SAGA: https://saga-gis.org/"
  echo ""
  echo "========================================="

# Idle detection configuration
idle_detection:
  enabled: true
  idle_threshold_minutes: 60     # Professional workflows have longer sessions
  hibernate_threshold_minutes: 150 # Preserve complex project state
  check_interval_minutes: 5
  detection_method: "composite"   # Check CPU, memory, network, disk

# Instance defaults optimized for advanced GIS
instance_defaults:
  type: "t3.large"  # 2 vCPU, 8 GB RAM - good for professional GIS
  ports: [22]       # SSH for SSM only, DCV tunneled
  estimated_cost_per_hour:
    x86_64: 0.0928   # t3.large hourly rate
    arm64: 0.0736    # t4g.large hourly rate (if ARM)

# Resource recommendations
recommended_sizes:
  - size: "M"
    instance_type: "t3.medium"
    vcpu: 2
    memory: 4
    use_case: "Light professional work, smaller datasets"
    cost_per_hour: 0.0464

  - size: "L"
    instance_type: "t3.large"
    vcpu: 2
    memory: 8
    use_case: "Standard professional GIS workflows (recommended)"
    cost_per_hour: 0.0928

  - size: "XL"
    instance_type: "t3.xlarge"
    vcpu: 4
    memory: 16
    use_case: "Large datasets, complex 3D analysis"
    cost_per_hour: 0.1856

  - size: "2XL"
    instance_type: "t3.2xlarge"
    vcpu: 8
    memory: 32
    use_case: "Very large datasets, heavy processing"
    cost_per_hour: 0.3712

# User guidance
estimated_launch_time: 12  # Minutes - DCV + extensive GIS software
prerequisites:
  - "Professional GIS knowledge (coordinate systems, projections, database concepts)"
  - "Familiarity with QGIS, GRASS, or similar GIS software"
  - "AWS CLI installed locally (for SSM)"
  - "Modern web browser (Chrome, Firefox, Edge)"

learning_resources:
  - "https://qgis.org/en/docs/"
  - "https://grass.osgeo.org/learn/"
  - "https://saga-gis.org/en/index.html"
  - "https://postgis.net/documentation/"
  - "https://gdal.org/tutorials/"
  - "https://docs.aws.amazon.com/dcv/latest/userguide/"
  - "https://github.com/scttfrdmn/prism/blob/main/docs/architecture/NICE_DCV_ARCHITECTURE.md"

# Template metadata
version: "1.0.0"
validation_status: "validated"
maintainer: "Prism Team"
tags:
  desktop: "mate"
  remote_desktop: "nice-dcv"
  connection_type: "desktop"
  gis: "qgis"
  geospatial: "true"
  grass: "true"
  saga: "true"
  postgis: "true"
  professional: "true"

# Advanced options
advanced_options:
  gpu_acceleration: false
  audio_support: false
  usb_redirection: false
  multi_monitor: true
