# Idle detection configuration
idle_detection:
  enabled: true
  idle_threshold_minutes: 60     # Statistical analysis has longer sessions
  hibernate_threshold_minutes: 150 # Preserve R workspace
  check_interval_minutes: 5
  detection_method: "composite"   # Check CPU, memory, network, disk

# Instance defaults optimized for R statistical computing
instance_defaults:
  type: "t3.large"  # 2 vCPU, 8 GB RAM - good for R
  ports: [22]       # SSH for SSM only, DCV tunneled
  estimated_cost_per_hour:
    x86_64: 0.0928   # t3.large hourly rate
    arm64: 0.0736    # t4g.large hourly rate (if ARM)

# Resource recommendations
recommended_sizes:
  - size: "M"
    instance_type: "t3.medium"
    vcpu: 2
    memory: 4
    use_case: "Small datasets, basic analysis"
    cost_per_hour: 0.0464

  - size: "L"
    instance_type: "t3.large"
    vcpu: 2
    memory: 8
    use_case: "Standard R workflows, medium datasets (recommended)"
    cost_per_hour: 0.0928

  - size: "XL"
    instance_type: "t3.xlarge"
    vcpu: 4
    memory: 16
    use_case: "Large datasets, complex models"
    cost_per_hour: 0.1856

  - size: "2XL"
    instance_type: "r5.2xlarge"
    vcpu: 8
    memory: 64
    use_case: "Very large datasets (multi-GB), memory-intensive"
    cost_per_hour: 0.504

# User guidance
estimated_launch_time: 12  # Minutes - DCV + RStudio + R packages
prerequisites:
  - "R programming knowledge"
  - "Statistical analysis experience"
  - "Familiarity with RStudio IDE"
  - "AWS CLI installed locally (for SSM)"
  - "Modern web browser"

learning_resources:
  - "https://docs.posit.co/"
  - "https://r4ds.hadley.nz/"
  - "https://www.tidyverse.org/"
  - "https://adv-r.hadley.nz/"
  - "https://bioconductor.org/"
  - "https://docs.aws.amazon.com/dcv/latest/userguide/"
  - "https://github.com/scttfrdmn/prism/blob/main/docs/architecture/NICE_DCV_ARCHITECTURE.md"

# Template metadata
version: "1.0.0"
validation_status: "validated"
maintainer: "Prism Team"
tags:
  desktop: "mate"
  remote_desktop: "nice-dcv"
  connection_type: "desktop"
  r: "true"
  rstudio: "desktop"
  statistics: "true"
  data_science: "true"
  tidyverse: "true"

# Advanced options
advanced_options:
  gpu_acceleration: false
  audio_support: false
  usb_redirection: false
  multi_monitor: true
