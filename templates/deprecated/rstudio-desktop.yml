# RStudio Desktop - R Statistical Computing with Desktop IDE
name: "RStudio Desktop"
slug: "rstudio-desktop"
description: "RStudio Desktop IDE with comprehensive R environment for statistical computing"
long_description: |
  Professional RStudio Desktop environment providing the full-featured desktop IDE rather than
  the browser-based RStudio Server. Includes comprehensive R packages for statistical analysis,
  data science, and visualization. Accessible via Nice DCV remote desktop.

  Features:
  - RStudio Desktop IDE (latest version)
  - R 4.x with comprehensive package ecosystem
  - Tidyverse, data.table, and core data science packages
  - Statistical modeling packages (lme4, survival, etc.)
  - Bioconductor support for genomics research
  - LaTeX for R Markdown PDF generation
  - MATE desktop environment
  - Nice DCV for browser-based remote desktop
  - Better performance than RStudio Server for large datasets
  - No exposed ports (secure SSM port forwarding)

  Use Cases:
  - Statistical analysis and modeling
  - Data science and machine learning in R
  - Genomics and bioinformatics (with Bioconductor)
  - Academic research requiring R Markdown reports
  - Large dataset analysis (better than web-based)
  - Interactive visualization with Shiny development

  Why Desktop vs Server:
  - Better performance for large datasets (no web overhead)
  - Full native IDE features (plugins, themes)
  - More responsive for interactive analysis
  - Direct access to local file system
  - Better debugging experience

base: "ubuntu-24.04"

# Connection configuration
connection_type: "desktop"

desktop:
  environment: "mate"          # Lightweight desktop
  dcv_port: 8443              # DCV server port (HTTPS)
  dcv_version: "latest"       # Use latest DCV release
  gpu_required: false         # No GPU needed for R
  session_type: "virtual"     # Virtual session
  session_user: "ubuntu"      # User for DCV session
  auth_method: "password"     # Password authentication

# Complexity and categorization
complexity: "intermediate"
category: "Desktop Environment"
domain: "statistics"

# Visual presentation
icon: "📊"
color: "#75AADB"  # RStudio blue
popular: true

# Package management
package_manager: "apt"
packages:
  system:
    # MATE Desktop Environment
    - ubuntu-mate-desktop
    - mate-desktop-environment

    # R and RStudio dependencies
    - r-base
    - r-base-dev
    - r-recommended
    - gdebi-core  # For RStudio .deb installation

    # LaTeX for R Markdown PDF generation
    - texlive-latex-base
    - texlive-latex-extra
    - texlive-fonts-recommended
    - texlive-fonts-extra
    - pandoc
    - pandoc-citeproc

    # Development tools and libraries
    - build-essential
    - libcurl4-openssl-dev
    - libssl-dev
    - libxml2-dev
    - libfontconfig1-dev
    - libharfbuzz-dev
    - libfribidi-dev
    - libfreetype6-dev
    - libpng-dev
    - libtiff5-dev
    - libjpeg-dev
    - git
    - curl
    - wget

    # Database connectivity
    - libpq-dev      # PostgreSQL
    - libmariadb-dev # MySQL/MariaDB
    - unixodbc-dev   # ODBC

    # Additional utilities
    - vim
    - htop
    - net-tools
    - firefox
    - gedit
    - file-roller
    - dbus-x11  # Required for DCV
    - mesa-utils

# System services
services:
  - name: dcv
    port: 8443
    description: "Nice DCV remote desktop"
    protocol: "https"

# Default user
users:
  - name: ubuntu
    groups: ["sudo", "adm", "video", "render"]
    shell: "/bin/bash"

# Cloud-init user data for DCV and RStudio installation
user_data: |
  #cloud-config

  # Update system
  package_update: true
  package_upgrade: true

  # Install prerequisites
  packages:
    - mesa-utils
    - ubuntu-mate-desktop
    - dbus-x11
    - lightdm
    - r-base
    - r-base-dev
    - gdebi-core
    - texlive-latex-base
    - pandoc

  runcmd:
    # Download and install Nice DCV server
    - wget https://d1uj6qtbmh3dt5.cloudfront.net/nice-dcv-ubuntu2404-x86_64.tgz -O /tmp/nice-dcv.tgz
    - tar -xzf /tmp/nice-dcv.tgz -C /tmp
    - apt install -y /tmp/nice-dcv-*-ubuntu2404-x86_64/*.deb

    # Configure DCV server
    - |
      cat > /etc/dcv/dcv.conf <<'EOF'
      [license]
      [log]
      level="info"
      [session-management]
      create-session = true
      [session-management/defaults]
      [session-management/automatic-console-session]
      owner="ubuntu"
      [display]
      [connectivity]
      enable-quic-frontend=true
      [security]
      authentication="system"
      EOF

    # Set password for ubuntu user (users should change this)
    - echo "ubuntu:ChangeMe123!" | chpasswd

    # Configure LightDM for automatic login
    - |
      cat > /etc/lightdm/lightdm.conf.d/50-dcv.conf <<'EOF'
      [Seat:*]
      autologin-user=ubuntu
      autologin-user-timeout=0
      EOF

    # Enable and start DCV server
    - systemctl enable dcvserver
    - systemctl start dcvserver

    # Download and install RStudio Desktop (latest stable)
    - wget https://download1.rstudio.org/electron/jammy/amd64/rstudio-2024.09.1-394-amd64.deb -O /tmp/rstudio.deb
    - gdebi -n /tmp/rstudio.deb

    # Install essential R packages as root (system-wide)
    - |
      R --vanilla --slave << 'RSCRIPT'
      # Set CRAN mirror
      options(repos = c(CRAN = "https://cloud.r-project.org/"))

      # Core tidyverse
      install.packages(c(
        "tidyverse",    # Complete tidyverse ecosystem
        "data.table",   # High-performance data manipulation
        "dtplyr"        # data.table backend for dplyr
      ))

      # Statistical modeling
      install.packages(c(
        "lme4",         # Mixed-effects models
        "survival",     # Survival analysis
        "caret",        # Machine learning
        "randomForest", # Random forest models
        "glmnet",       # Regularized regression
        "mgcv"          # Generalized additive models
      ))

      # Data visualization
      install.packages(c(
        "ggplot2",      # Grammar of graphics (in tidyverse)
        "plotly",       # Interactive plots
        "patchwork",    # Combine plots
        "gganimate"     # Animated plots
      ))

      # R Markdown and reporting
      install.packages(c(
        "rmarkdown",    # Dynamic documents
        "knitr",        # Report generation
        "bookdown",     # Books and long documents
        "blogdown"      # Websites and blogs
      ))

      # Database connectivity
      install.packages(c(
        "DBI",          # Database interface
        "RPostgres",    # PostgreSQL
        "RMariaDB",     # MySQL/MariaDB
        "RSQLite"       # SQLite
      ))

      # Bioconductor (for genomics users)
      if (!requireNamespace("BiocManager", quietly = TRUE))
        install.packages("BiocManager")
      BiocManager::install(version = "3.19")

      cat("✅ Essential R packages installed successfully\n")
      RSCRIPT

    # Create initial DCV session
    - sleep 10
    - sudo -u ubuntu dcv create-session --type=virtual --owner ubuntu my-session

    # Create RStudio desktop workspace
    - |
      mkdir -p /home/ubuntu/Desktop
      mkdir -p /home/ubuntu/R-Projects
      mkdir -p /home/ubuntu/R-Data
      mkdir -p /home/ubuntu/R-Scripts

      cat > /home/ubuntu/Desktop/RStudio-Quick-Start.txt <<'EOF'
      RStudio Desktop - Quick Start Guide
      ====================================

      📊 Getting Started:
      1. Launch RStudio from Applications → Development → RStudio
      2. Your R workspace: ~/R-Projects/
      3. Data directory: ~/R-Data/
      4. Scripts: ~/R-Scripts/

      📡 Connection:
      From local: prism connect <instance-name>

      📦 Pre-installed R Packages:

      Data Manipulation:
      • tidyverse (dplyr, tidyr, purrr, stringr, etc.)
      • data.table (high-performance)
      • dtplyr (data.table + dplyr syntax)

      Statistical Modeling:
      • lme4 (mixed-effects models)
      • survival (survival analysis)
      • caret (machine learning)
      • randomForest, glmnet, mgcv

      Visualization:
      • ggplot2 (grammar of graphics)
      • plotly (interactive plots)
      • patchwork (combine plots)
      • gganimate (animations)

      Reporting:
      • rmarkdown (dynamic documents)
      • knitr (report generation)
      • bookdown, blogdown

      Database:
      • DBI, RPostgres, RMariaDB, RSQLite

      Bioconductor:
      • BiocManager installed (for genomics packages)

      💡 Quick Tips:

      1. Install Additional Packages:
         install.packages("package-name")

      2. Bioconductor Packages:
         BiocManager::install("package-name")

      3. Load Package:
         library(package-name)

      4. R Markdown:
         File → New File → R Markdown

      5. Version Control:
         Tools → Version Control → Project Setup

      6. Large Datasets:
         Use data.table for multi-GB data
         library(data.table)
         dt <- fread("large-file.csv")

      7. Parallel Processing:
         library(parallel)
         library(foreach)
         library(doParallel)

      🔧 RStudio Settings:
      Tools → Global Options:
      • Appearance: Choose theme
      • Code: Enable rainbow parentheses
      • R Markdown: Enable visual editor
      • Git/SVN: Configure version control

      📂 Recommended Workflow:
      1. Create R Project: File → New Project
      2. Use R Markdown for reproducible analysis
      3. Version control with Git
      4. Use here() package for file paths
      5. Document with roxygen2 comments

      🔑 Security:
      Change password immediately: passwd

      📚 Resources:
      • RStudio: https://docs.posit.co/
      • R for Data Science: https://r4ds.hadley.nz/
      • Tidyverse: https://www.tidyverse.org/
      • Advanced R: https://adv-r.hadley.nz/
      • Bioconductor: https://bioconductor.org/

      🆘 Support:
      https://github.com/scttfrdmn/prism/issues
      EOF

      # Create sample R project structure
      mkdir -p /home/ubuntu/R-Projects/sample-project
      cat > /home/ubuntu/R-Projects/sample-project/analysis.R <<'EOF'
      # Sample R Analysis Script
      # Load required packages
      library(tidyverse)

      # Read data (example)
      # data <- read_csv("~/R-Data/mydata.csv")

      # Example analysis
      cat("Welcome to RStudio Desktop on Prism!\n")
      cat("R version:", R.version.string, "\n")
      cat("Installed packages:", length(.packages(all.available = TRUE)), "\n")
      EOF

      chown -R ubuntu:ubuntu /home/ubuntu/Desktop
      chown -R ubuntu:ubuntu /home/ubuntu/R-*

    # Clean up
    - rm -rf /tmp/nice-dcv*
    - rm -f /tmp/rstudio.deb

