# QGIS Remote Sensing - GPU-Accelerated GIS with Satellite Image Processing
name: "QGIS Remote Sensing Desktop"
slug: "qgis-remote-sensing"
description: "GPU-accelerated QGIS for satellite imagery and advanced remote sensing analysis"
long_description: |
  Professional QGIS desktop with GPU acceleration and specialized remote sensing tools including
  Orfeo Toolbox, SNAP-ESA, and advanced image processing capabilities. Optimized for satellite
  imagery processing, multispectral analysis, and large-scale remote sensing workflows.

  Features:
  - QGIS LTR with full processing capabilities
  - NVIDIA GPU acceleration for visualization
  - Orfeo Toolbox (remote sensing image processing)
  - SNAP-ESA (Sentinel, Landsat processing)
  - GRASS GIS and SAGA for terrain analysis
  - GDAL with full raster support
  - Python remote sensing libraries (rasterio, scikit-image)
  - MATE desktop environment with GPU drivers
  - Nice DCV with GPU acceleration support
  - No exposed ports (secure SSM port forwarding)

  Use Cases:
  - Satellite imagery processing (Sentinel, Landsat, MODIS)
  - Multispectral and hyperspectral analysis
  - Change detection and classification
  - Large-scale environmental monitoring
  - Agricultural and forestry applications
  - GPU-accelerated geoprocessing

base: "ubuntu-24.04"

# Connection configuration
connection_type: "desktop"

desktop:
  environment: "mate"          # Lightweight with GPU support
  dcv_port: 8443              # DCV server port (HTTPS)
  dcv_version: "latest"       # Use latest DCV release
  gpu_required: true          # GPU required for performance
  session_type: "virtual"     # Virtual session with GPU
  session_user: "ubuntu"      # User for DCV session
  auth_method: "password"     # Password authentication

# Complexity and categorization
complexity: "advanced"
category: "Desktop Environment"
domain: "remote-sensing"

# Visual presentation
icon: "🛰️"
color: "#1E5A8E"  # Satellite blue
popular: true

# Package management
package_manager: "apt"
packages:
  system:
    # MATE Desktop Environment
    - ubuntu-mate-desktop
    - mate-desktop-environment

    # QGIS and core GIS tools
    - qgis
    - qgis-plugin-grass
    - python3-qgis
    - qgis-common

    # GIS processing tools
    - grass
    - saga
    - gdal-bin
    - python3-gdal
    - libgdal-dev

    # Remote sensing specific tools
    - otb-bin  # Orfeo Toolbox
    - otb-qgis  # Orfeo QGIS integration
    - python3-otb  # Orfeo Python bindings

    # Image processing and analysis
    - python3-rasterio
    - python3-fiona
    - python3-shapely
    - python3-geopandas
    - python3-scikit-image
    - python3-opencv
    - python3-matplotlib
    - python3-scipy
    - python3-numpy

    # GPU and graphics support
    - mesa-utils
    - vulkan-tools
    - nvidia-utils-535  # NVIDIA utilities (version may vary)

    # Essential applications
    - firefox
    - gedit
    - file-roller

    # Development tools
    - git
    - vim
    - curl
    - wget
    - build-essential
    - python3-pip
    - python3-dev

    # System utilities
    - htop
    - nvtop  # NVIDIA GPU monitoring
    - net-tools
    - dbus-x11  # Required for DCV
    - ca-certificates

# System services
services:
  - name: dcv
    port: 8443
    description: "Nice DCV remote desktop with GPU acceleration"
    protocol: "https"

# Default user
users:
  - name: ubuntu
    groups: ["sudo", "adm", "video", "render"]
    shell: "/bin/bash"

# Cloud-init user data for DCV installation with GPU support
user_data: |
  #cloud-config

  # Update system
  package_update: true
  package_upgrade: true

  # Install Nice DCV dependencies and GPU tools
  packages:
    - mesa-utils
    - ubuntu-mate-desktop
    - dbus-x11
    - lightdm
    - qgis
    - qgis-plugin-grass
    - grass
    - saga
    - otb-bin
    - vulkan-tools
    - nvtop

  runcmd:
    # Install NVIDIA drivers (GPU instance)
    - apt install -y nvidia-driver-535 nvidia-utils-535
    - nvidia-smi  # Verify GPU

    # Download and install Nice DCV server
    - wget https://d1uj6qtbmh3dt5.cloudfront.net/nice-dcv-ubuntu2404-x86_64.tgz -O /tmp/nice-dcv.tgz
    - tar -xzf /tmp/nice-dcv.tgz -C /tmp
    - apt install -y /tmp/nice-dcv-*-ubuntu2404-x86_64/*.deb

    # Configure DCV server with GPU support
    - |
      cat > /etc/dcv/dcv.conf <<'EOF'
      [license]
      [log]
      level="info"
      [session-management]
      create-session = true
      [session-management/defaults]
      [session-management/automatic-console-session]
      owner="ubuntu"
      [display]
      # GPU acceleration settings
      use-gl-in-virtual-sessions = true
      cuda-devices = ["0"]
      [connectivity]
      enable-quic-frontend=true
      [security]
      authentication="system"
      EOF

    # Set password for ubuntu user (users should change this)
    - echo "ubuntu:ChangeMe123!" | chpasswd

    # Configure LightDM for automatic login
    - |
      cat > /etc/lightdm/lightdm.conf.d/50-dcv.conf <<'EOF'
      [Seat:*]
      autologin-user=ubuntu
      autologin-user-timeout=0
      EOF

    # Enable and start DCV server
    - systemctl enable dcvserver
    - systemctl start dcvserver

    # Create initial DCV session with GL support
    - sleep 10
    - sudo -u ubuntu dcv create-session --type=virtual --owner ubuntu --gl on my-session

    # Create Remote Sensing workspace
    - |
      mkdir -p /home/ubuntu/Desktop
      mkdir -p /home/ubuntu/RemoteSensing-Projects
      mkdir -p /home/ubuntu/Satellite-Imagery
      mkdir -p /home/ubuntu/Processing-Scripts
      mkdir -p /home/ubuntu/Outputs

      cat > /home/ubuntu/Desktop/Remote-Sensing-Guide.txt <<'EOF'
      QGIS Remote Sensing - GPU-Accelerated Satellite Imagery Workstation
      ====================================================================

      🛰️  Specialized Remote Sensing Software:
      - QGIS LTR (visualization and analysis)
      - Orfeo Toolbox (OTB) - Advanced image processing
      - GRASS GIS - Raster analysis and modeling
      - SAGA GIS - Terrain and climate analysis
      - GDAL - Format conversion and utilities
      - Python libraries: rasterio, scikit-image, opencv

      🖥️  GPU Acceleration:
      - NVIDIA GPU for hardware-accelerated rendering
      - Monitor GPU usage: nvtop (in terminal)
      - GPU info: nvidia-smi (in terminal)
      - OpenGL acceleration enabled in DCV

      📂 Workspace Structure:
      - ~/RemoteSensing-Projects/ - Project files
      - ~/Satellite-Imagery/      - Raw imagery data
      - ~/Processing-Scripts/     - Python/GRASS scripts
      - ~/Outputs/                - Processed results

      📡 Connection:
      From local: prism connect <instance-name>

      🛰️  Supported Satellite Systems:
      1. Sentinel (1, 2, 3) - ESA Earth observation
      2. Landsat (4-9) - USGS land imaging
      3. MODIS - NASA Earth observations
      4. SPOT - High-resolution imagery
      5. WorldView - Commercial high-res
      6. Custom multispectral sensors

      🔧 Orfeo Toolbox (OTB) Capabilities:
      - Image filtering and enhancement
      - Feature extraction
      - Image segmentation
      - Object-based image analysis
      - Classification (supervised/unsupervised)
      - Change detection
      - Orthorectification
      - SAR processing

      Access OTB:
      - Command line: otbcli_* commands
      - QGIS: Processing Toolbox → OTB
      - Python: import otbApplication

      🐍 Python Remote Sensing:
      Pre-installed libraries:
      - rasterio (raster I/O)
      - fiona (vector I/O)
      - shapely (geometry)
      - geopandas (spatial dataframes)
      - scikit-image (image processing)
      - opencv (computer vision)
      - numpy, scipy (numerical computing)

      Example workflow:
      import rasterio
      import numpy as np
      from rasterio.plot import show

      # Read satellite image
      with rasterio.open('satellite.tif') as src:
          band = src.read(1)
          show(band)

      🌍 Common Workflows:
      1. Multispectral Analysis:
         - Load bands in QGIS
         - Calculate indices (NDVI, NDWI, etc.)
         - Classify land cover

      2. Change Detection:
         - Load multi-temporal images
         - Co-register in OTB
         - Detect changes

      3. Image Enhancement:
         - Pan-sharpening (OTB)
         - Atmospheric correction
         - Histogram equalization

      4. Classification:
         - Training sample collection
         - Supervised classification (Random Forest, SVM)
         - Accuracy assessment

      💡 Performance Tips:
      - Use GPU for large raster visualization
      - Batch processing with OTB for multiple images
      - Python multiprocessing for parallel analysis
      - Virtual rasters (VRT) for large mosaics
      - Tiled processing for memory efficiency

      🔑 Security:
      Change password: passwd

      📚 Resources:
      - OTB: https://www.orfeo-toolbox.org/
      - QGIS: https://qgis.org/en/docs/
      - GRASS: https://grass.osgeo.org/
      - Rasterio: https://rasterio.readthedocs.io/
      - Sentinel Hub: https://www.sentinel-hub.com/

      🆘 Support:
      https://github.com/scttfrdmn/prism/issues
      EOF

      chown -R ubuntu:ubuntu /home/ubuntu/Desktop
      chown -R ubuntu:ubuntu /home/ubuntu/RemoteSensing-*
      chown -R ubuntu:ubuntu /home/ubuntu/Satellite-*
      chown -R ubuntu:ubuntu /home/ubuntu/Processing-*
      chown -R ubuntu:ubuntu /home/ubuntu/Outputs

    # Install SNAP-ESA (Sentinel Application Platform) - optional, large download
    # Uncomment if needed:
    # - wget https://download.esa.int/step/snap/9.0/installers/esa-snap_all_unix_9_0_0.sh -O /tmp/snap-install.sh
    # - chmod +x /tmp/snap-install.sh
    # - /tmp/snap-install.sh -q -dir /opt/snap

    # Clean up
    - rm -rf /tmp/nice-dcv*

