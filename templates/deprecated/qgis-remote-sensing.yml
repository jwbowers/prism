# Idle detection configuration (aggressive for expensive GPU instance)
idle_detection:
  enabled: true
  idle_threshold_minutes: 30     # GPU instances are expensive
  hibernate_threshold_minutes: 90 # Preserve state but save costs
  check_interval_minutes: 5
  detection_method: "composite"   # Check CPU, memory, network, disk, GPU

# Instance defaults optimized for remote sensing with GPU
instance_defaults:
  type: "g4dn.xlarge"  # 4 vCPU, 16 GB RAM, NVIDIA T4 GPU
  ports: [22]          # SSH for SSM only, DCV tunneled
  estimated_cost_per_hour:
    x86_64: 0.526      # g4dn.xlarge hourly rate

# Resource recommendations
recommended_sizes:
  - size: "L"
    instance_type: "g4dn.xlarge"
    vcpu: 4
    memory: 16
    gpu: "NVIDIA T4 (16GB)"
    use_case: "Standard remote sensing, moderate imagery (recommended)"
    cost_per_hour: 0.526

  - size: "XL"
    instance_type: "g4dn.2xlarge"
    vcpu: 8
    memory: 32
    gpu: "NVIDIA T4 (16GB)"
    use_case: "Large-scale processing, heavy workloads"
    cost_per_hour: 0.752

  - size: "2XL"
    instance_type: "g4dn.4xlarge"
    vcpu: 16
    memory: 64
    gpu: "NVIDIA T4 (16GB)"
    use_case: "Very large datasets, parallel processing"
    cost_per_hour: 1.204

# User guidance
estimated_launch_time: 15  # Minutes - DCV + GPU drivers + remote sensing software
prerequisites:
  - "Remote sensing knowledge (satellite systems, spectral bands, image processing)"
  - "Familiarity with QGIS and raster analysis"
  - "Understanding of multispectral/hyperspectral imagery"
  - "Python programming (for automation)"
  - "AWS CLI installed locally (for SSM)"
  - "Modern web browser with WebGL support"

learning_resources:
  - "https://www.orfeo-toolbox.org/CookBook/"
  - "https://qgis.org/en/docs/"
  - "https://grass.osgeo.org/learn/"
  - "https://rasterio.readthedocs.io/"
  - "https://www.sentinel-hub.com/explore/education/"
  - "https://docs.aws.amazon.com/dcv/latest/userguide/"
  - "https://github.com/scttfrdmn/prism/blob/main/docs/architecture/NICE_DCV_ARCHITECTURE.md"

# Template metadata
version: "1.0.0"
validation_status: "validated"
maintainer: "Prism Team"
tags:
  desktop: "mate"
  remote_desktop: "nice-dcv"
  connection_type: "desktop"
  gis: "qgis"
  remote_sensing: "true"
  satellite: "true"
  gpu: "true"
  orfeo: "true"
  advanced: "true"

# Advanced options
advanced_options:
  gpu_acceleration: true
  audio_support: false
  usb_redirection: false
  multi_monitor: true
