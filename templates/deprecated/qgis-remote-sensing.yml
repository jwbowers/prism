  echo "   - Python: rasterio, scikit-image, opencv"
  echo ""
  echo "🖥️  GPU Acceleration:"
  echo "   - NVIDIA GPU enabled"
  echo "   - OpenGL acceleration in DCV"
  echo "   - Monitor GPU: nvtop (in terminal)"
  echo ""
  echo "📂 Workspace Directories:"
  echo "   - ~/RemoteSensing-Projects/ (projects)"
  echo "   - ~/Satellite-Imagery/ (raw data)"
  echo "   - ~/Processing-Scripts/ (automation)"
  echo "   - ~/Outputs/ (results)"
  echo ""
  echo "🔒 Security:"
  echo "   - No exposed ports (SSM tunneling)"
  echo "   - Browser-based access"
  echo "   - SSL encrypted connection"
  echo ""
  echo "📚 Documentation:"
  echo "   - Complete guide on desktop"
