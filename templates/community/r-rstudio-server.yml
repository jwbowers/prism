name: "R + RStudio Server"
slug: "r-rstudio-server"
description: "R environment with RStudio Server web IDE (inherits from R Base)"
long_description: |
  Builds on R Base to add web-based IDE access.

  Includes everything from R Base, plus:
  - RStudio Server 2026.01.0 (web IDE on port 8787, version customizable)
  - PAM authentication (use system password)
  - Auto-start on boot
  - Multi-user support

  Access RStudio in your browser at: http://your-ip:8787

  Perfect for:
  - Interactive R development
  - Collaborative data analysis
  - Teaching R programming
  - Remote research teams

  For full publishing stack (Quarto, LaTeX), use: r-publishing-stack

author: "Prism Team"
version: "1.0.0"
base: "ubuntu-24.04"

# Connection type
connection_type: "ssh"

# Complexity and categorization
complexity: "intermediate"
category: "Research Tools"
domain: "research"

# Visual presentation
icon: "🖥️"
color: "#276DC3"
popular: true

# Architecture
architecture: "x86_64"

# Use APT package manager
package_manager: "apt"

# Inherit from R Base
inherits: ["R Base (Ubuntu 24.04)"]

# Template parameters for customization
parameters:
  rstudio_version:
    name: "rstudio_version"
    display_name: "RStudio Server Version"
    description: "RStudio Server version to install"
    type: "choice"
    choices: ["latest", "2026.01.1-403", "2026.01.0-392", "2024.12.1-542", "2024.09.1-394"]
    default: "latest"
    group: "Development Environment"
    order: 1

# Additional packages beyond R Base
packages:
  # RStudio Server dependencies (gdebi handles dependencies)
  rstudio_deps:
    - "gdebi-core"
    - "psmisc"  # For process management

# Users inherited from parent (researcher with sudo)

# Services
services:
  - name: "rstudio-server"
    port: 8787
    type: "web"
    description: "RStudio Server (web-based R IDE)"
    start_command: "sudo systemctl start rstudio-server"
    check_command: "systemctl is-active rstudio-server"

# Ports - add RStudio Server port
ports:
  - 22    # SSH (from parent)
  - 8787  # RStudio Server

# Post-installation script
post_install: |
  #!/bin/bash
  set -e

  # Prevent interactive prompts during package installation
  export DEBIAN_FRONTEND=noninteractive
  export NEEDRESTART_MODE=a

  echo "🔧 Installing RStudio Server layer..."

  # Update system
  apt-get update

  # Install RStudio Server
  echo "🖥️  Installing RStudio Server..."
  if [ "{{.rstudio_version}}" = "latest" ]; then
    # Use latest available version (2026.01.1-403 as of February 2026)
    # Posit provides jammy (Ubuntu 22.04) debs for Ubuntu 24.04 via glibc compatibility
    RSTUDIO_VERSION="2026.01.1-403"
  else
    RSTUDIO_VERSION="{{.rstudio_version}}"
  fi
  echo "Installing RStudio Server version: ${RSTUDIO_VERSION}"
  wget https://download2.rstudio.org/server/jammy/amd64/rstudio-server-${RSTUDIO_VERSION}-amd64.deb
  gdebi --non-interactive rstudio-server-${RSTUDIO_VERSION}-amd64.deb
  rm rstudio-server-${RSTUDIO_VERSION}-amd64.deb

  # Configure RStudio Server
  echo "⚙️  Configuring RStudio Server..."
  mkdir -p /etc/rstudio
  cat > /etc/rstudio/rserver.conf <<'RSTUDIO_CONF'
  # RStudio Server Configuration
  www-address=0.0.0.0
  www-port=8787
  rsession-which-r=/usr/bin/R
  auth-required-user-group=sudo
  RSTUDIO_CONF

  # Enable and start RStudio Server
  systemctl enable rstudio-server
  systemctl start rstudio-server

  # Verify RStudio Server is running
  if systemctl is-active --quiet rstudio-server; then
    echo "✅ RStudio Server started successfully"
  else
    echo "⚠️  RStudio Server failed to start"
    systemctl status rstudio-server
  fi

  # Set password for researcher user (required for RStudio Server PAM authentication)
  # SSH key auth handles terminal access, but RStudio Server needs a system password
  RESEARCHER_PASSWORD=$(openssl rand -base64 12)
  echo "researcher:${RESEARCHER_PASSWORD}" | chpasswd
  echo ""
  echo "============================================="
  echo "  RStudio Server Login Credentials"
  echo "  Username: researcher"
  echo "  Password: ${RESEARCHER_PASSWORD}"
  echo "============================================="
  echo ""

  # Update welcome message
  echo "Updating welcome message..."
  cat > /home/researcher/WELCOME.txt <<'WELCOME_END'
  R + RStudio Server Environment

  RStudio Server (Web IDE):
    URL: http://YOUR_IP:8787
    Username: researcher
    Password: from provisioning log (reset via: sudo passwd researcher)

  R Version: Inherited from R Base layer
  Packages: tidyverse, rmarkdown, knitr, devtools

  Access Methods:
    1. Web IDE: Open browser to port 8787
    2. Terminal: SSH and type 'R'
    3. Scripts: Rscript my_analysis.R

  Add Collaborators:
    sudo adduser colleague
    sudo usermod -aG sudo colleague
    (They can login at http://YOUR_IP:8787)

  For publishing tools (Quarto, LaTeX), use: r-publishing-stack template
  WELCOME_END

  chown researcher:researcher /home/researcher/WELCOME.txt

  # Cleanup
  apt-get autoremove -y
  apt-get clean

  echo "✅ RStudio Server layer installation complete!"
  echo ""
  INSTANCE_IP=$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4 2>/dev/null || hostname -I | awk '{print $1}')
  echo "🖥️  RStudio Server: http://${INSTANCE_IP}:8787"
  echo "👤 Login: username 'researcher', password above"
  echo "   To reset: sudo passwd researcher (via SSH)"
  echo ""

# Idle detection - check both R and RStudio processes
idle_detection:
  enabled: true
  idle_threshold_minutes: 30  # Longer for web IDE sessions
  check_processes:
    - "R"
    - "rsession"
    - "rstudio"

# Instance defaults
instance_defaults:
  ports: [22, 8787]
  root_volume_gb: 25  # Slightly larger for RStudio Server

# Research user configuration
research_users:
  enabled: true
  default_shell: "/bin/bash"
  default_groups: ["sudo"]
  ssh_key_required: false

# Component versions
components:
  r_version: "4.4.2"  # From parent
  rstudio_server_version: "2026.01.1-403"  # Default (latest)

# Tags
tags:
  type: "research"
  purpose: "data-science"
  level: "intermediate"
  language: "r"
  layer: "rstudio"
  web_interface: "true"
