name: "R Research Publishing Stack"
slug: "r-publishing-stack"
description: "Complete R research environment with Quarto, LaTeX, Python (inherits from R + RStudio Server)"
long_description: |
  Full-featured R research environment built via template stacking.

  Inherits from R + RStudio Server, adding:
  - Quarto 1.6.33 for scientific publishing
  - TeX Live 2024 (full LaTeX distribution)
  - Python 3.12 with Jupyter Lab
  - Database clients (PostgreSQL, MySQL, SQLite)
  - Git LFS for large files
  - Complete data science toolkit

  This is the top layer of the stacked template approach:
    Layer 1: R Base (R 4.4+ with essential packages)
    Layer 2: + RStudio Server (web IDE)
    Layer 3: + Publishing tools (this template)

  Compare with r-research-full-stack (monolithic approach)

  Perfect for:
  - Publishing research papers
  - Mixed R/Python workflows
  - Collaborative analysis with non-technical colleagues
  - Teaching data science

author: "Prism Team"
version: "1.0.0"
base: "ubuntu-24.04"

# Connection type
connection_type: "ssh"

# Complexity and categorization
complexity: "complex"
category: "Research Tools"
domain: "research"

# Visual presentation
icon: "📚"
color: "#276DC3"
popular: true

# Architecture
architecture: "x86_64"

# Use APT package manager
package_manager: "apt"

# Inherit from R + RStudio Server (which inherits from R Base)
inherits: ["R + RStudio Server"]

# Template parameters for customization
parameters:
  # RStudio Server version (passed to parent template)
  rstudio_version:
    name: "rstudio_version"
    display_name: "RStudio Server Version"
    description: "RStudio Server version to install"
    type: "choice"
    choices: ["latest", "2026.01.1-403", "2026.01.0-392", "2024.12.1-542", "2024.09.1-394"]
    default: "latest"
    group: "Development Environment"
    order: 1
    impact: "Version affects available features and compatibility"

  # R package plugins
  install_languageserver:
    name: "install_languageserver"
    display_name: "Install Language Server"
    description: "Install R languageserver package for LSP support in editors"
    type: "bool"
    default: true
    group: "R Packages"
    order: 10

  languageserver_version:
    name: "languageserver_version"
    display_name: "Language Server Version"
    description: "Version of languageserver package"
    type: "choice"
    choices: ["latest", "0.3.16", "0.3.15"]
    default: "latest"
    group: "R Packages"
    order: 11
    conditional: "{{.install_languageserver}}"

  install_renv:
    name: "install_renv"
    display_name: "Install renv"
    description: "Install renv package for reproducible R environments"
    type: "bool"
    default: true
    group: "R Packages"
    order: 20

  renv_version:
    name: "renv_version"
    display_name: "renv Version"
    description: "Version of renv package"
    type: "choice"
    choices: ["latest", "1.0.7", "1.0.3"]
    default: "latest"
    group: "R Packages"
    order: 21
    conditional: "{{.install_renv}}"

# Additional packages beyond R + RStudio Server
packages:
  # LaTeX and document tools
  latex:
    - "texlive-full"
    - "texlive-xetex"
    - "texlive-fonts-extra"
    - "pandoc"
    - "ghostscript"
    - "pdftk-java"
    - "imagemagick"

  # Database clients
  databases:
    - "postgresql-client"
    - "mysql-client"
    - "sqlite3"

  # Data processing tools
  data_tools:
    - "csvkit"
    - "jq"
    - "xmlstarlet"

  # Terminal and session management
  terminal:
    - "tmux"
    - "screen"
    - "htop"
    - "tree"
    - "ncdu"

  # Text editors
  editors:
    - "vim"
    - "nano"
    - "emacs-nox"

  # Compression tools
  compression:
    - "zip"
    - "unzip"
    - "bzip2"
    - "p7zip-full"

  # File transfer
  transfer:
    - "rsync"
    - "wget"
    - "curl"

  # Python for mixed workflows
  python:
    - "python3.12"
    - "python3.12-dev"
    - "python3.12-venv"
    - "python3-pip"
    - "python3-numpy"
    - "python3-pandas"
    - "python3-matplotlib"
    - "python3-seaborn"
    - "python3-sklearn"
    - "python3-scipy"

# Users inherited from parents (researcher with sudo from R Base)

# Services - add Jupyter to existing RStudio Server
services:
  - name: "jupyter"
    port: 8888
    type: "web"
    description: "Jupyter Notebook Server"
    start_command: "jupyter lab --ip=0.0.0.0 --no-browser"
    check_command: "pgrep -f jupyter-lab"

# Ports - add Jupyter port
ports:
  - 22    # SSH (from R Base)
  - 8787  # RStudio Server (from R + RStudio Server)
  - 8888  # Jupyter Lab

# Post-installation script
post_install: |
  #!/bin/bash
  set -e

  # Prevent interactive prompts during package installation (required for texlive etc.)
  export DEBIAN_FRONTEND=noninteractive
  export NEEDRESTART_MODE=a

  echo "🔧 Installing Publishing Stack layer..."

  # Update system
  apt-get update

  # Install Quarto
  echo "📝 Installing Quarto 1.6.33..."
  wget https://github.com/quarto-dev/quarto-cli/releases/download/v1.6.33/quarto-1.6.33-linux-amd64.deb
  apt-get install -y ./quarto-1.6.33-linux-amd64.deb
  rm quarto-1.6.33-linux-amd64.deb
  echo "✅ Quarto installed: $(quarto --version)"

  # Install R packages for publishing
  echo "📦 Installing R publishing packages..."
  Rscript -e "
  # Use Posit Package Manager for pre-built binaries (no compilation, Ubuntu 24.04 noble)
  options(repos = c(CRAN = 'https://packagemanager.posit.co/cran/__linux__/noble/latest'))
  install.packages(c(
    'bookdown',      # Books and long documents
    'blogdown',      # Websites and blogs
    'xaringan',      # Presentations
    'gt',            # Tables
    'gtsummary',     # Summary tables
    'DBI',           # Database interface
    'RSQLite',       # SQLite support
    'RPostgres',     # PostgreSQL support
    'RMySQL',        # MySQL support
    'reticulate',    # Python integration
    'shiny',         # Interactive web apps
    'plotly'         # Interactive plots
  ))

  cat('\n✅ Publishing packages installed\n')
  "

  # Python data science packages (numpy, pandas, etc.) already installed via apt in packages: section
  # Install JupyterLab in a venv with --system-site-packages so it sees apt-installed numpy/pandas/etc.
  # This avoids pip/apt conflicts (Ubuntu 24.04 PEP 668 + traitlets RECORD issue)
  echo "🐍 Installing JupyterLab in isolated venv..."
  python3 -m venv --system-site-packages /opt/jupyterlab
  /opt/jupyterlab/bin/pip install --quiet jupyterlab
  ln -sf /opt/jupyterlab/bin/jupyter /usr/local/bin/jupyter
  ln -sf /opt/jupyterlab/bin/jupyter-lab /usr/local/bin/jupyter-lab
  echo "✅ JupyterLab installed at /opt/jupyterlab (jupyter command available system-wide)"

  # Install Git LFS
  echo "📦 Installing Git LFS..."
  curl -s https://packagecloud.io/install/repositories/github/git-lfs/script.deb.sh | bash
  apt-get install -y git-lfs
  git lfs install --system
  echo "✅ Git LFS installed"

  # Set password for researcher user (required for RStudio Server PAM authentication)
  RESEARCHER_PASSWORD=$(openssl rand -base64 12)
  echo "researcher:${RESEARCHER_PASSWORD}" | chpasswd
  echo ""
  echo "============================================="
  echo "  RStudio Server Login Credentials"
  echo "  Username: researcher"
  echo "  Password: ${RESEARCHER_PASSWORD}"
  echo "============================================="
  echo ""

  # Create additional directories
  mkdir -p /home/researcher/{notebooks,documents}
  chown -R researcher:researcher /home/researcher

  # Update welcome message
  cat > /home/researcher/WELCOME.txt <<'WELCOME_END'
  R Research Publishing Stack (Stacked Template)

  This environment was built via template inheritance:
    Layer 1: R Base (R 4.4+, tidyverse, etc.)
    Layer 2: + RStudio Server (web IDE)
    Layer 3: + Publishing tools (Quarto, LaTeX, Python)

  Access Points:
    RStudio Server: http://YOUR_IP:8787
    Jupyter Lab: jupyter lab --ip=0.0.0.0 --no-browser
                 then http://YOUR_IP:8888

  Publishing Tools:
    Quarto: Scientific publishing (quarto render)
    LaTeX: PDF generation (Full TeX Live 2024)
    Pandoc: Document conversion

  Python Integration:
    Python 3.12 with Jupyter
    R reticulate package for R-Python workflows

  Database Clients:
    PostgreSQL, MySQL, SQLite
    R packages: DBI, RPostgres, RMySQL, RSQLite

  Git:
    Version control with LFS for large files

  Directories:
    ~/projects/  - Research projects
    ~/data/      - Data files
    ~/notebooks/ - Jupyter notebooks
    ~/documents/ - Quarto/RMarkdown documents
    ~/scripts/   - R and Python scripts

  Compare with: r-research-full-stack (monolithic version)
  WELCOME_END

  chown researcher:researcher /home/researcher/WELCOME.txt

  # Install R package plugins
  echo "🔌 Installing R package plugins..."
  {{if .install_languageserver}}
  echo "  Installing languageserver package..."
  if [ "{{.languageserver_version}}" = "latest" ]; then
    R -e "install.packages('languageserver', repos='https://cloud.r-project.org')"
  else
    R -e "if (!requireNamespace('remotes', quietly = TRUE)) install.packages('remotes', repos='https://cloud.r-project.org'); remotes::install_version('languageserver', version='{{.languageserver_version}}', repos='https://cloud.r-project.org')"
  fi
  echo "  ✅ languageserver installed"
  {{end}}

  {{if .install_renv}}
  echo "  Installing renv package..."
  if [ "{{.renv_version}}" = "latest" ]; then
    R -e "install.packages('renv', repos='https://cloud.r-project.org')"
  else
    R -e "if (!requireNamespace('remotes', quietly = TRUE)) install.packages('remotes', repos='https://cloud.r-project.org'); remotes::install_version('renv', version='{{.renv_version}}', repos='https://cloud.r-project.org')"
  fi
  echo "  ✅ renv installed"
  {{end}}

  echo "✅ R package plugins installation complete"

  # Cleanup
  apt-get autoremove -y
  apt-get clean

  echo "✅ Publishing Stack layer installation complete!"
  echo ""
  echo "📚 Full R Research Publishing Stack ready!"
  INSTANCE_IP=$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4 2>/dev/null || hostname -I | awk '{print $1}')
  echo "🖥️  RStudio Server: http://${INSTANCE_IP}:8787"
  echo "📊 Quarto: $(quarto --version)"
  echo "📝 LaTeX: Full TeX Live 2024"
  echo "🐍 Python: $(python3 --version)"
  echo ""

# Idle detection
idle_detection:
  enabled: true
  idle_threshold_minutes: 30
  check_processes:
    - "R"
    - "rsession"
    - "rstudio"
    - "python"
    - "jupyter"

# Instance defaults
instance_defaults:
  ports: [22, 8787, 8888]
  root_volume_gb: 80  # Larger for LaTeX (texlive-full ~8 GB), R packages, and Python libs
  instance_type_preference: ["m7i.xlarge", "m6i.xlarge", "m6a.xlarge", "m7i.2xlarge"]  # Current-gen compute for R workloads

# Research user configuration
research_users:
  enabled: true
  default_shell: "/bin/bash"
  default_groups: ["sudo"]
  ssh_key_required: false

# Component versions
components:
  r_version: "4.4.2"  # From R Base
  rstudio_server_version: "2026.01.1-403"  # From R + RStudio Server (via jammy deb)
  quarto_version: "1.6.33"
  python_version: "3.12"
  texlive_version: "2024"

# Tags
tags:
  type: "research"
  purpose: "data-science"
  level: "advanced"
  language: "r-python"
  layer: "publishing"
  web_interface: "true"
  collaborative: "true"
  stacked: "true"
