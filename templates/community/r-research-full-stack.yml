name: "R Research Full Stack"
slug: "r-research-full-stack"
description: "Complete R research environment with RStudio Server, Quarto, Python, Jupyter, and core data science packages"
long_description: |
  All-in-one R research environment designed for collaborative research.

  Includes:
  - R 4.5+ with core tidyverse packages (ggplot2, dplyr, tidyr, etc.)
  - RStudio Server 2026.01 (web-based IDE on port 8787)
  - Quarto for document publishing
  - LaTeX for PDF generation
  - Python 3.12 with Jupyter Lab
  - Database clients (PostgreSQL, MySQL, SQLite)
  - Web scraping tools (httr, xml2, rvest)
  - Git for version control

  Focused on reliability and fast setup. Additional packages can be
  installed via RStudio as needed.

author: "Prism Team"
version: "1.0.0"
base: "ubuntu-24.04"

# Connection type
connection_type: "ssh"

# Complexity and categorization
complexity: "complex"
category: "Research Tools"
domain: "research"

# Visual presentation
icon: "📊"
color: "#276DC3"
popular: true

# Architecture
architecture: "x86_64"

# Use APT package manager for system packages
package_manager: "apt"

# Inherit from Ubuntu 24.04 base
inherits: ["Ubuntu 24.04 LTS (x86_64)"]

# Template parameters for customization
parameters:
  # RStudio Server version
  rstudio_version:
    name: "rstudio_version"
    display_name: "RStudio Server Version"
    description: "RStudio Server version to install"
    type: "choice"
    choices: ["latest", "2026.01.1-403", "2026.01.0-392", "2024.12.1-542", "2024.09.1-394"]
    default: "latest"
    group: "Development Environment"
    order: 1
    impact: "Version affects available features and compatibility"

  # R package plugins
  install_languageserver:
    name: "install_languageserver"
    display_name: "Install Language Server"
    description: "Install R languageserver package for LSP support in editors"
    type: "bool"
    default: true
    group: "R Packages"
    order: 10

  languageserver_version:
    name: "languageserver_version"
    display_name: "Language Server Version"
    description: "Version of languageserver package"
    type: "choice"
    choices: ["latest", "0.3.16", "0.3.15"]
    default: "latest"
    group: "R Packages"
    order: 11
    conditional: "{{.install_languageserver}}"

  install_renv:
    name: "install_renv"
    display_name: "Install renv"
    description: "Install renv package for reproducible R environments"
    type: "bool"
    default: true
    group: "R Packages"
    order: 20

  renv_version:
    name: "renv_version"
    display_name: "renv Version"
    description: "Version of renv package"
    type: "choice"
    choices: ["latest", "1.0.7", "1.0.3"]
    default: "latest"
    group: "R Packages"
    order: 21
    conditional: "{{.install_renv}}"

# System and application packages
packages:
  # Core system tools
  system:
    - "build-essential"
    - "software-properties-common"
    - "apt-transport-https"
    - "ca-certificates"
    - "gnupg"
    - "lsb-release"
    - "dirmngr"

  # R dependencies
  r_dependencies:
    - "gfortran"
    - "libcurl4-openssl-dev"
    - "libssl-dev"
    - "libxml2-dev"
    - "libfontconfig1-dev"
    - "libharfbuzz-dev"
    - "libfribidi-dev"
    - "libfreetype6-dev"
    - "libpng-dev"
    - "libtiff5-dev"
    - "libjpeg-dev"
    - "libgit2-dev"

  # LaTeX and document tools
  latex:
    - "texlive-full"
    - "texlive-xetex"
    - "texlive-fonts-extra"
    - "pandoc"
    - "ghostscript"
    - "pdftk-java"
    - "imagemagick"

  # Database clients
  databases:
    - "postgresql-client"
    - "mysql-client"
    - "sqlite3"

  # Data processing tools
  data_tools:
    - "csvkit"
    - "jq"
    - "xmlstarlet"

  # Terminal and session management
  terminal:
    - "tmux"
    - "screen"
    - "htop"
    - "tree"
    - "ncdu"

  # Text editors
  editors:
    - "vim"
    - "nano"
    - "emacs-nox"

  # Compression tools
  compression:
    - "zip"
    - "unzip"
    - "bzip2"
    - "p7zip-full"

  # File transfer
  transfer:
    - "rsync"
    - "wget"
    - "curl"

  # Python for mixed workflows
  python:
    - "python3.12"
    - "python3.12-dev"
    - "python3.12-venv"
    - "python3-pip"
    - "python3-numpy"
    - "python3-pandas"
    - "python3-matplotlib"
    - "python3-seaborn"
    - "python3-sklearn"
    - "python3-scipy"

# Users
users:
  - name: "researcher"
    groups: ["sudo"]
    shell: "/bin/bash"

# Services
services:
  - name: "rstudio-server"
    port: 8787
    type: "web"
    description: "RStudio Server (web-based R IDE)"
    start_command: "sudo systemctl start rstudio-server"
    check_command: "systemctl is-active rstudio-server"

  - name: "jupyter"
    port: 8888
    type: "web"
    description: "Jupyter Notebook Server"
    start_command: "jupyter lab --ip=0.0.0.0 --no-browser"
    check_command: "pgrep -f jupyter-lab"

# Ports to open
ports:
  - 22    # SSH
  - 8787  # RStudio Server
  - 8888  # Jupyter (optional)

# Post-installation script
post_install: |
  #!/bin/bash
  set -e

  # Prevent interactive prompts (required for texlive, grub, etc.)
  export DEBIAN_FRONTEND=noninteractive
  export NEEDRESTART_MODE=a

  echo "🔧 Starting R Research Full Stack configuration..."

  # Update system
  echo "📦 Updating system packages..."
  apt-get update && apt-get upgrade -y

  # System dependencies are installed by the template package system
  # (no need to explicitly install them here)

  # Install R 4.4.2
  echo "📊 Installing R 4.4.2..."
  wget -qO- https://cloud.r-project.org/bin/linux/ubuntu/marutter_pubkey.asc | tee -a /etc/apt/trusted.gpg.d/cran_ubuntu_key.asc
  add-apt-repository -y "deb https://cloud.r-project.org/bin/linux/ubuntu $(lsb_release -cs)-cran40/"
  apt-get update
  apt-get install -y r-base r-base-dev

  # Verify R version
  R_VERSION=$(R --version | head -n1)
  echo "✅ R installed: $R_VERSION"

  # Install RStudio Server
  echo "🖥️  Installing RStudio Server..."
  apt-get install -y gdebi-core
  if [ "{{.rstudio_version}}" = "latest" ]; then
    # Use latest available version (2026.01.1-403 as of February 2026)
    # Posit provides jammy (Ubuntu 22.04) debs for Ubuntu 24.04 via glibc compatibility
    RSTUDIO_VERSION="2026.01.1-403"
  else
    RSTUDIO_VERSION="{{.rstudio_version}}"
  fi
  wget https://download2.rstudio.org/server/jammy/amd64/rstudio-server-${RSTUDIO_VERSION}-amd64.deb
  gdebi -n rstudio-server-${RSTUDIO_VERSION}-amd64.deb
  rm rstudio-server-${RSTUDIO_VERSION}-amd64.deb

  # Enable and start RStudio Server
  systemctl enable rstudio-server
  systemctl start rstudio-server
  echo "✅ RStudio Server installed and started (port 8787)"

  # Install Quarto 1.6.33
  echo "📝 Installing Quarto..."
  wget https://github.com/quarto-dev/quarto-cli/releases/download/v1.6.33/quarto-1.6.33-linux-amd64.deb
  apt-get install -y ./quarto-1.6.33-linux-amd64.deb
  rm quarto-1.6.33-linux-amd64.deb
  echo "✅ Quarto installed"

  # Install essential R packages using Posit Package Manager (pre-built binaries for Ubuntu 24.04)
  # P3M provides binary CRAN packages - fast install, no compilation, current versions
  echo "📦 Installing essential R packages via Posit Package Manager..."
  Rscript -e "
  options(repos = c(CRAN = 'https://packagemanager.posit.co/cran/__linux__/noble/latest'))
  install.packages(c(
    'tidyverse',   # ggplot2, dplyr, tidyr, readr, purrr, stringr, forcats, tibble
    'rmarkdown',   # Dynamic documents
    'knitr',       # Literate programming
    'lubridate',   # Date/time handling
    'jsonlite',    # JSON handling
    'here',        # Project-relative paths
    'glue',        # String interpolation
    'httr',        # HTTP requests
    'xml2',        # XML parsing
    'rvest',       # Web scraping
    'DBI',         # Database interface
    'RSQLite',     # SQLite support
    'RPostgres',   # PostgreSQL support
    'RMySQL',      # MySQL support
    'shiny',       # Interactive web apps
    'plotly',      # Interactive plots
    'reticulate'   # Python integration
  ))
  cat('\n✅ Core R packages installed\n')
  "
  echo "📝 Note: Additional packages can be installed via RStudio as needed"

  # Python data science packages already installed via apt in packages: section above (numpy, pandas, etc.)
  # Install JupyterLab in a venv with --system-site-packages so it sees apt-installed numpy/pandas/etc.
  # This avoids pip/apt conflicts (Ubuntu 24.04 PEP 668 + traitlets RECORD issue)
  echo "🐍 Installing JupyterLab in isolated venv..."
  python3 -m venv --system-site-packages /opt/jupyterlab
  /opt/jupyterlab/bin/pip install --quiet jupyterlab
  ln -sf /opt/jupyterlab/bin/jupyter /usr/local/bin/jupyter
  ln -sf /opt/jupyterlab/bin/jupyter-lab /usr/local/bin/jupyter-lab
  echo "✅ JupyterLab installed (jupyter command available system-wide)"

  # Install Git LFS
  echo "📦 Installing Git LFS..."
  curl -s https://packagecloud.io/install/repositories/github/git-lfs/script.deb.sh | bash
  apt-get install -y git-lfs
  git lfs install --system
  echo "✅ Git LFS installed"

  # Configure RStudio Server for better performance
  echo "⚙️  Configuring RStudio Server..."
  mkdir -p /etc/rstudio
  cat > /etc/rstudio/rserver.conf <<'RSTUDIO_CONF'
  # RStudio Server Configuration
  www-address=0.0.0.0
  www-port=8787
  rsession-which-r=/usr/bin/R
  auth-required-user-group=sudo
  RSTUDIO_CONF

  # Restart RStudio Server with new configuration
  systemctl restart rstudio-server

  # Set password for researcher user (required for RStudio Server PAM authentication)
  RESEARCHER_PASSWORD=$(openssl rand -base64 12)
  echo "researcher:${RESEARCHER_PASSWORD}" | chpasswd
  echo ""
  echo "============================================="
  echo "  RStudio Server Login Credentials"
  echo "  Username: researcher"
  echo "  Password: ${RESEARCHER_PASSWORD}"
  echo "============================================="
  echo ""

  # Create researcher user home directory structure
  mkdir -p /home/researcher/{projects,data,notebooks,documents,scripts}
  chown -R researcher:researcher /home/researcher

  # Create welcome message
  echo "Creating welcome message..."
  echo "Welcome to R Research Full Stack" > /home/researcher/WELCOME.txt
  echo "" >> /home/researcher/WELCOME.txt
  echo "RStudio Server: http://\$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4 2>/dev/null || hostname -I | awk '{print \$1}'):8787" >> /home/researcher/WELCOME.txt
  echo "Jupyter Lab: jupyter lab --ip=0.0.0.0 --no-browser" >> /home/researcher/WELCOME.txt
  echo "" >> /home/researcher/WELCOME.txt
  echo "Installed: R 4.4+, RStudio Server, Quarto, LaTeX, Python 3.12, Jupyter" >> /home/researcher/WELCOME.txt
  echo "Documentation: See /home/researcher/README.md for full guide" >> /home/researcher/WELCOME.txt
  chown researcher:researcher /home/researcher/WELCOME.txt

  # Install R package plugins
  echo "🔌 Installing R package plugins..."
  {{if .install_languageserver}}
  echo "  Installing languageserver package..."
  if [ "{{.languageserver_version}}" = "latest" ]; then
    R -e "install.packages('languageserver', repos='https://cloud.r-project.org')"
  else
    R -e "if (!requireNamespace('remotes', quietly = TRUE)) install.packages('remotes', repos='https://cloud.r-project.org'); remotes::install_version('languageserver', version='{{.languageserver_version}}', repos='https://cloud.r-project.org')"
  fi
  echo "  ✅ languageserver installed"
  {{end}}

  {{if .install_renv}}
  echo "  Installing renv package..."
  if [ "{{.renv_version}}" = "latest" ]; then
    R -e "install.packages('renv', repos='https://cloud.r-project.org')"
  else
    R -e "if (!requireNamespace('remotes', quietly = TRUE)) install.packages('remotes', repos='https://cloud.r-project.org'); remotes::install_version('renv', version='{{.renv_version}}', repos='https://cloud.r-project.org')"
  fi
  echo "  ✅ renv installed"
  {{end}}

  echo "✅ R package plugins installation complete"

  # Final cleanup
  apt-get autoremove -y
  apt-get clean

  echo "✅ R Research Full Stack installation complete!"
  echo ""
  INSTANCE_IP=$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4 2>/dev/null || hostname -I | awk '{print $1}')
  echo "📊 RStudio Server: http://${INSTANCE_IP}:8787"
  echo "🐍 Jupyter Lab: Start with 'jupyter lab --ip=0.0.0.0 --no-browser'"
  echo "📝 Welcome guide: /home/researcher/WELCOME.md"
  echo ""

# Idle detection configuration
idle_detection:
  enabled: true
  idle_threshold_minutes: 30  # Longer threshold for research workloads
  check_processes:
    - "rstudio"
    - "R"
    - "python"
    - "jupyter"

# Instance defaults
instance_defaults:
  ports: [22, 8787, 8888]
  root_volume_gb: 80  # Larger for LaTeX (texlive-full ~8 GB), R packages, and Python libs
  instance_type_preference: ["m7i.xlarge", "m6i.xlarge", "m6a.xlarge", "m7i.2xlarge"]  # Current-gen compute for R workloads

# Research user configuration
research_users:
  enabled: true
  default_shell: "/bin/bash"
  default_groups: ["sudo"]
  ssh_key_required: false

# Component versions (for reference)
components:
  r_version: "4.4.2"
  rstudio_server_version: "2024.12.0"
  quarto_version: "1.6.33"
  python_version: "3.12"
  texlive_version: "2024"

# Tags for marketplace
tags:
  type: "research"
  purpose: "data-science"
  level: "intermediate"
  language: "r-python"
  web_interface: "true"
  collaborative: "true"
