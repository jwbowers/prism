name: "Streamlit Data Apps"
slug: "streamlit"
description: "Interactive Python data apps and dashboards — turn analysis into shareable web apps"
long_description: |
  Deploy interactive Python data applications instantly with Streamlit.
  Perfect for turning Jupyter notebooks into shareable web apps, building
  ML model demos, and creating interactive teaching materials.

  Includes:
  - Python 3.11 with a pre-built virtual environment
  - Streamlit + pandas, numpy, plotly, scikit-learn, seaborn
  - Demo app at ~/apps/demo.py ready to run on port 8501
  - Streamlit service starts automatically on boot

author: "Prism Team"
version: "1.0.0"
base: "ubuntu-24.04"
connection_type: "web"

complexity: "simple"
category: "Research Tools"
domain: "datascience"
icon: "🌊"
color: "#ff4b4b"
popular: true

package_manager: "apt"
packages:
  system:
    - python3
    - python3-pip
    - python3-venv
    - python3-dev
    - git
    - curl
    - htop

users:
  - name: "researcher"
    groups: ["sudo"]
    shell: "/bin/bash"

services:
  - name: streamlit
    port: 8501
    type: "web"
    start_command: "systemctl start streamlit"
    check_command: "systemctl is-active streamlit"
    enable: true

post_install: |
  #!/bin/bash
  set -e
  export DEBIAN_FRONTEND=noninteractive
  export NEEDRESTART_MODE=a

  echo "🌊 Installing Streamlit environment..."

  # Create Python virtual environment as researcher
  sudo -u researcher python3 -m venv /home/researcher/.venv
  /home/researcher/.venv/bin/pip install --upgrade pip --quiet

  # Install Streamlit and common data science packages
  /home/researcher/.venv/bin/pip install --quiet \
    streamlit pandas numpy matplotlib seaborn plotly altair scikit-learn requests openpyxl

  # Create demo app directory
  mkdir -p /home/researcher/apps
  cat > /home/researcher/apps/demo.py << 'APPEOF'
  import streamlit as st
  import pandas as pd
  import numpy as np
  import plotly.express as px

  st.set_page_config(page_title="Prism Streamlit Demo", page_icon="🌊", layout="wide")
  st.title("🌊 Welcome to Streamlit on Prism!")
  st.markdown("Edit `~/apps/demo.py` to build your own app.")

  col1, col2 = st.columns(2)
  with col1:
    st.subheader("Random Data Explorer")
    n = st.slider("Number of data points", 10, 1000, 100)
    df = pd.DataFrame({
      "x": np.random.randn(n),
      "y": np.random.randn(n),
      "category": np.random.choice(["Group A", "Group B", "Group C"], n),
    })
    fig = px.scatter(df, x="x", y="y", color="category", title="Sample Scatter Plot")
    st.plotly_chart(fig, use_container_width=True)

  with col2:
    st.subheader("Getting Started")
    st.code("# SSH in:\nprism connect <instance-name>\n\n# Edit the demo app:\nnano ~/apps/demo.py\n\n# Restart:\nsudo systemctl restart streamlit")

  st.dataframe(df, use_container_width=True)
  APPEOF

  # Strip the 2-space indent that YAML requires from the Python source file
  python3 -c "
  import textwrap
  with open('/home/researcher/apps/demo.py') as f:
    content = textwrap.dedent(f.read())
  with open('/home/researcher/apps/demo.py', 'w') as f:
    f.write(content)
  "

  # Configure Streamlit
  mkdir -p /home/researcher/.streamlit
  cat > /home/researcher/.streamlit/config.toml << 'CFGEOF'
  [server]
  headless = true
  port = 8501
  address = "0.0.0.0"
  enableCORS = false
  enableXsrfProtection = false

  [browser]
  gatherUsageStats = false
  CFGEOF

  # Create systemd service
  cat > /etc/systemd/system/streamlit.service << 'SVCEOF'
  [Unit]
  Description=Streamlit Data App Server
  After=network.target

  [Service]
  Type=simple
  User=researcher
  WorkingDirectory=/home/researcher
  ExecStart=/home/researcher/.venv/bin/streamlit run /home/researcher/apps/demo.py
  Restart=always
  RestartSec=5
  Environment="HOME=/home/researcher"
  Environment="PATH=/home/researcher/.venv/bin:/usr/local/bin:/usr/bin:/bin"

  [Install]
  WantedBy=multi-user.target
  SVCEOF

  # Fix ownership
  chown -R researcher:researcher /home/researcher

  # Enable and start service
  systemctl daemon-reload
  systemctl enable streamlit
  systemctl start streamlit

  echo "✅ Streamlit installation complete!"
  echo "🌊 Access Streamlit at: http://<public-ip>:8501"
  echo "📝 Edit your app:  ~/apps/demo.py"
  echo "🔄 Restart server: sudo systemctl restart streamlit"

idle_detection:
  enabled: true
  idle_threshold_minutes: 20
  hibernate_threshold_minutes: 60
  check_interval_minutes: 5
  check_processes:
    - "streamlit"
    - "python3"

instance_defaults:
  type: "t3.small"
  ports: [22, 8501]
  root_volume_gb: 20
  estimated_cost_per_hour:
    x86_64: 0.0208

estimated_launch_time: 5
prerequisites:
  - "Basic Python knowledge"
learning_resources:
  - "https://docs.streamlit.io"
  - "https://streamlit.io/gallery"

validation_status: "validated"
tags:
  type: "web-app"
  language: "python"
  interface: "browser"
  purpose: "data-apps"
