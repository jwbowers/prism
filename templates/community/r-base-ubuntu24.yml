name: "R Base (Ubuntu 24.04)"
slug: "r-base-ubuntu24"
description: "Minimal R 4.4+ environment on Ubuntu 24.04 with essential packages"
long_description: |
  Lightweight R installation suitable for:
  - Basic R scripting and analysis
  - Building block for more complex R environments
  - Learning R programming
  - Command-line R workflows

  Includes:
  - R 4.4+ from CRAN
  - Essential R packages: tidyverse, rmarkdown, knitr
  - System dependencies for R package compilation
  - Git for version control

  This is a base layer - use r-rstudio-server or r-publishing-stack for
  web-based environments.

author: "Prism Team"
version: "1.0.0"
base: "ubuntu-24.04"

# Connection type
connection_type: "ssh"

# Complexity and categorization
complexity: "simple"
category: "Research Tools"
domain: "research"

# Visual presentation
icon: "📊"
color: "#276DC3"
popular: false

# Architecture
architecture: "x86_64"

# Use APT package manager
package_manager: "apt"

# Inherit from Ubuntu 24.04 base
inherits: ["Ubuntu 24.04 LTS (x86_64)"]

# Universal plugins - tool-agnostic configurations
plugins:
  enabled:
    - name: "git"
      version: "latest"
      configuration:
        enable_lfs: false

# System and R packages
packages:
  # R dependencies for package compilation
  r_dependencies:
    - "software-properties-common"   # required for add-apt-repository
    - "gfortran"
    - "libcurl4-openssl-dev"
    - "libssl-dev"
    - "libxml2-dev"
    - "libfontconfig1-dev"
    - "libharfbuzz-dev"
    - "libfribidi-dev"
    - "libfreetype6-dev"
    - "libpng-dev"
    - "libtiff5-dev"
    - "libjpeg-dev"
    - "libgit2-dev"

# Users
users:
  - name: "researcher"
    groups: ["sudo"]
    shell: "/bin/bash"

# Services
services: []

# Ports
ports:
  - 22  # SSH only

# Post-installation script
post_install: |
  #!/bin/bash
  set -e

  # Prevent interactive prompts during package installation
  export DEBIAN_FRONTEND=noninteractive

  echo "🔧 Installing R Base environment..."

  # Update system
  apt-get update && apt-get upgrade -y

  # Add R repository
  echo "📦 Adding R 4.4 repository..."
  wget -qO- https://cloud.r-project.org/bin/linux/ubuntu/marutter_pubkey.asc | tee -a /etc/apt/trusted.gpg.d/cran_ubuntu_key.asc
  add-apt-repository -y "deb https://cloud.r-project.org/bin/linux/ubuntu $(lsb_release -cs)-cran40/"

  # Install R
  echo "📊 Installing R 4.4+..."
  apt-get update
  apt-get install -y r-base r-base-dev

  # Verify R version
  R_VERSION=$(R --version | head -n1)
  echo "✅ R installed: $R_VERSION"

  # Install essential R packages
  echo "📦 Installing essential R packages..."
  Rscript -e "
  install.packages(c(
    'tidyverse',    # Data manipulation and visualization
    'rmarkdown',    # Dynamic documents
    'knitr',        # Literate programming
    'devtools',     # Package development
    'here',         # Project-relative paths
    'jsonlite',     # JSON handling
    'httr'          # HTTP requests
  ), repos='https://cloud.r-project.org/')

  cat('\n✅ Essential R packages installed\n')
  "

  # Create directory structure
  mkdir -p /home/researcher/{projects,data,scripts}
  chown -R researcher:researcher /home/researcher

  # Create welcome message
  echo "Creating welcome message..."
  echo "R Base Environment (Ubuntu 24.04)" > /home/researcher/WELCOME.txt
  echo "" >> /home/researcher/WELCOME.txt
  echo "R Version: \$(R --version | head -n1)" >> /home/researcher/WELCOME.txt
  echo "" >> /home/researcher/WELCOME.txt
  echo "Installed packages: tidyverse, rmarkdown, knitr, devtools" >> /home/researcher/WELCOME.txt
  echo "" >> /home/researcher/WELCOME.txt
  echo "Run R: Type 'R' in terminal" >> /home/researcher/WELCOME.txt
  echo "Run script: Rscript my_script.R" >> /home/researcher/WELCOME.txt
  echo "" >> /home/researcher/WELCOME.txt
  echo "For web-based IDE, use: r-rstudio-server template" >> /home/researcher/WELCOME.txt
  chown researcher:researcher /home/researcher/WELCOME.txt

  # Cleanup
  apt-get autoremove -y
  apt-get clean

  echo "✅ R Base installation complete!"
  echo ""
  echo "📊 R: $(R --version | head -n1)"
  echo "📂 Directories: ~/projects, ~/data, ~/scripts"
  echo ""

# Idle detection
idle_detection:
  enabled: true
  idle_threshold_minutes: 15
  check_processes:
    - "R"

# Instance defaults
instance_defaults:
  ports: [22]
  root_volume_gb: 20

# Research user configuration
research_users:
  enabled: true
  default_shell: "/bin/bash"
  default_groups: ["sudo"]
  ssh_key_required: false

# Component versions
components:
  r_version: "4.4.2"

# Tags
tags:
  type: "research"
  purpose: "data-science"
  level: "beginner"
  language: "r"
  layer: "base"
