# Generic Desktop Environment with Nice DCV
name: "Generic Desktop (MATE + DCV)"
slug: "generic-desktop"
description: "Lightweight desktop environment with MATE desktop and Nice DCV remote access"
long_description: |
  Complete desktop environment with MATE desktop, Nice DCV server, and essential applications.
  Perfect for users who need GUI applications with browser-based remote desktop access.

  Features:
  - MATE desktop environment (lightweight, performant)
  - Nice DCV for browser-based remote desktop
  - No exposed ports (secure SSM port forwarding)
  - Essential desktop applications and development tools
  - Automatic DCV server startup

base: "ubuntu-24.04"

# Connection configuration
connection_type: "desktop"

desktop:
  environment: "mate"          # Lightweight desktop environment
  dcv_port: 8443              # DCV server port (HTTPS)
  dcv_version: "latest"       # Use latest DCV release
  gpu_required: false         # No GPU needed for basic desktop
  session_type: "virtual"     # Virtual session (no physical display)
  session_user: "ubuntu"      # User for DCV session
  auth_method: "password"     # Password authentication

# Complexity and categorization
complexity: "simple"
category: "Desktop Environment"
domain: "desktop"

# Visual presentation
icon: "🖥️"
color: "#87A96B"  # MATE green
popular: true

# Package management
package_manager: "apt"
packages:
  system:
    # MATE Desktop Environment
    - ubuntu-mate-desktop
    - mate-desktop-environment

    # Essential applications
    - firefox
    - libreoffice
    - gedit
    - gnome-calculator
    - file-roller  # Archive manager

    # Development tools
    - git
    - vim
    - curl
    - wget

    # System utilities
    - htop
    - net-tools
    - dbus-x11  # Required for DCV
    - mesa-utils  # OpenGL utilities

# System services
services:
  - name: dcv
    port: 8443
    description: "Nice DCV remote desktop"
    protocol: "https"

# Default user
users:
  - name: ubuntu
    groups: ["sudo", "adm", "video", "render"]
    shell: "/bin/bash"

# Cloud-init user data for DCV installation
user_data: |
  #cloud-config

  # Update system
  package_update: true
  package_upgrade: true

  # Install Nice DCV dependencies
  packages:
    - mesa-utils
    - ubuntu-mate-desktop
    - dbus-x11
    - lightdm

  runcmd:
    # Download and install Nice DCV server
    - wget https://d1uj6qtbmh3dt5.cloudfront.net/nice-dcv-ubuntu2404-x86_64.tgz -O /tmp/nice-dcv.tgz
    - tar -xzf /tmp/nice-dcv.tgz -C /tmp
    - apt install -y /tmp/nice-dcv-*-ubuntu2404-x86_64/*.deb

    # Configure DCV server
    - |
      cat > /etc/dcv/dcv.conf <<'EOF'
      [license]
      [log]
      level="info"
      [session-management]
      create-session = true
      [session-management/defaults]
      [session-management/automatic-console-session]
      owner="ubuntu"
      [display]
      [connectivity]
      enable-quic-frontend=true
      [security]
      authentication="system"
      EOF

    # Set password for ubuntu user (users should change this)
    - echo "ubuntu:ChangeMe123!" | chpasswd

    # Configure LightDM for automatic login
    - |
      cat > /etc/lightdm/lightdm.conf.d/50-dcv.conf <<'EOF'
      [Seat:*]
      autologin-user=ubuntu
      autologin-user-timeout=0
      EOF

    # Enable and start DCV server
    - systemctl enable dcvserver
    - systemctl start dcvserver

    # Create initial DCV session
    - sleep 10
    - sudo -u ubuntu dcv create-session --type=virtual --owner ubuntu my-session

    # Create desktop launcher for session info
    - |
      mkdir -p /home/ubuntu/Desktop
      cat > /home/ubuntu/Desktop/DCV-Connection-Info.txt <<'EOF'
      Nice DCV Remote Desktop
      =======================

      To connect from your local machine:

      1. Run: prism connect <instance-name>
      2. Your browser will open to the DCV session
      3. Login with your instance credentials

      DCV Session Details:
      - Session ID: my-session
      - User: ubuntu
      - Port: 8443 (HTTPS)

      Features:
      - Copy/paste between local and remote
      - File transfer via browser
      - Full desktop environment
      - Hardware-accelerated graphics (if GPU available)
      EOF
      chown ubuntu:ubuntu /home/ubuntu/Desktop/DCV-Connection-Info.txt

    # Clean up
    - rm -rf /tmp/nice-dcv*

# Post-install message
post_install: |
  #!/bin/bash

  echo "========================================="
  echo "Desktop Environment Setup Complete!"
  echo "========================================="
  echo ""
  echo "🖥️  MATE Desktop with Nice DCV is ready"
  echo ""
  echo "📡 To connect:"
  echo "   prism connect {{ .InstanceName }}"
  echo ""
  echo "🔑 Default Credentials:"
  echo "   Username: ubuntu"
  echo "   Password: ChangeMe123!"
  echo "   ⚠️  IMPORTANT: Change this password immediately!"
  echo ""
  echo "🔒 Security:"
  echo "   - No exposed ports (SSM tunneling)"
  echo "   - Browser-based access"
  echo "   - SSL encrypted connection"
  echo ""
  echo "📚 DCV Features:"
  echo "   - Copy/paste support"
  echo "   - File transfer"
  echo "   - Multiple monitor support"
  echo "   - Hardware acceleration"
  echo ""
  echo "========================================="

# Idle detection configuration
idle_detection:
  enabled: true
  idle_threshold_minutes: 30     # Desktop users typically have longer idle times
  hibernate_threshold_minutes: 90 # Preserve desktop session state
  check_interval_minutes: 5
  detection_method: "composite"   # Check CPU, memory, network, disk

# Instance defaults optimized for desktop
instance_defaults:
  type: "t3.large"  # 2 vCPU, 8 GB RAM - good for desktop
  ports: [22]       # SSH for SSM only, DCV tunneled
  estimated_cost_per_hour:
    x86_64: 0.0928  # t3.large hourly rate
    arm64: 0.0736   # t4g.large hourly rate (if ARM)

# Resource recommendations
recommended_sizes:
  - size: "M"
    instance_type: "t3.medium"
    vcpu: 2
    memory: 4
    use_case: "Light desktop use, basic applications"
    cost_per_hour: 0.0464

  - size: "L"
    instance_type: "t3.large"
    vcpu: 2
    memory: 8
    use_case: "Standard desktop, multiple applications (recommended)"
    cost_per_hour: 0.0928

  - size: "XL"
    instance_type: "t3.xlarge"
    vcpu: 4
    memory: 16
    use_case: "Heavy desktop workloads, many concurrent applications"
    cost_per_hour: 0.1856

# User guidance
estimated_launch_time: 8  # Minutes - DCV installation takes time
prerequisites:
  - "Basic Linux desktop experience"
  - "AWS CLI installed locally (for SSM)"
  - "Modern web browser"

learning_resources:
  - "https://docs.aws.amazon.com/dcv/latest/userguide/"
  - "https://ubuntu-mate.org/about/"
  - "https://github.com/scttfrdmn/prism/blob/main/docs/architecture/NICE_DCV_ARCHITECTURE.md"

# Template metadata
version: "1.0.0"
validation_status: "experimental"
maintainer: "Prism Team"
tags:
  desktop: "mate"
  remote_desktop: "nice-dcv"
  connection_type: "desktop"
  gui: "true"

# Advanced options
advanced_options:
  gpu_acceleration: false
  audio_support: true
  usb_redirection: false
  multi_monitor: true
