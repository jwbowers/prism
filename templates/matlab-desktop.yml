# MATLAB Desktop - Commercial Numerical Computing Environment
name: "MATLAB Desktop"
slug: "matlab-desktop"
description: "MATLAB desktop environment for numerical computing, data analysis, and algorithm development"
long_description: |
  Professional MATLAB desktop environment providing the complete MATLAB platform for numerical
  computing, data analysis, visualization, and algorithm development. Accessible via Nice DCV
  remote desktop with flexible licensing options.

  Features:
  - MATLAB R2024b desktop environment
  - Core MATLAB with essential toolboxes
  - Simulink for model-based design
  - MATLAB Compiler for deployment
  - Parallel Computing Toolbox
  - Statistics and Machine Learning Toolbox
  - Image Processing Toolbox
  - Signal Processing Toolbox
  - MATE desktop environment
  - Nice DCV for browser-based remote desktop
  - No exposed ports (secure SSM port forwarding)

  Use Cases:
  - Algorithm development and prototyping
  - Data analysis and visualization
  - Signal and image processing
  - Machine learning and statistics
  - Control systems and simulation
  - Engineering computation and modeling
  - Scientific research computing

  License Options:
  1. **Cloud-Based License**: Online activation via MathWorks account
  2. **Network License**: Connect to institutional license server
  3. **AWS Marketplace**: Pre-configured AMI with integrated licensing

  Note: This template requires a valid MATLAB license. See learning resources
  for license acquisition options.

base: "ubuntu-24.04"

# Connection configuration
connection_type: "desktop"

desktop:
  environment: "mate"          # Lightweight desktop
  dcv_port: 8443              # DCV server port (HTTPS)
  dcv_version: "latest"       # Use latest DCV release
  gpu_required: false         # Optional GPU for Parallel Computing Toolbox
  session_type: "virtual"     # Virtual session
  session_user: "ubuntu"      # User for DCV session
  auth_method: "password"     # Password authentication

# Complexity and categorization
complexity: "advanced"
category: "Desktop Environment"
domain: "numerical-computing"

# Visual presentation
icon: "🔢"
color: "#E97826"  # MATLAB orange
popular: true

# Template parameters for license configuration
parameters:
  license_type:
    type: "choice"
    description: "MATLAB license type"
    default: "online"
    choices:
      - online
      - network
      - marketplace

  license_server:
    type: "string"
    description: "Network license server (format: port@hostname)"
    default: ""
    required: false
    condition: "license_type == 'network'"

  matlab_version:
    type: "choice"
    description: "MATLAB version"
    default: "R2024b"
    choices:
      - R2024b
      - R2024a
      - R2023b

  install_simulink:
    type: "bool"
    description: "Install Simulink"
    default: true

  install_toolboxes:
    type: "choice"
    description: "Toolbox bundle"
    default: "standard"
    choices:
      - minimal
      - standard
      - complete

# Package management
package_manager: "apt"
packages:
  system:
    # MATE Desktop Environment
    - ubuntu-mate-desktop
    - mate-desktop-environment

    # MATLAB dependencies
    - build-essential
    - gcc
    - g++
    - gfortran
    - make
    - libglu1-mesa
    - libxrender1
    - libxrandr2
    - libxi6
    - libxcursor1
    - libxtst6
    - libxinerama1
    - libgomp1
    - libsndfile1
    - libasound2
    - libpulse0

    # Scientific computing support
    - python3
    - python3-pip
    - python3-numpy
    - python3-scipy
    - python3-matplotlib

    # Essential applications
    - firefox
    - gedit
    - file-roller
    - evince  # PDF viewer for documentation

    # Development tools
    - git
    - vim
    - curl
    - wget

    # System utilities
    - htop
    - net-tools
    - dbus-x11  # Required for DCV
    - mesa-utils

# System services
services:
  - name: dcv
    port: 8443
    description: "Nice DCV remote desktop"
    protocol: "https"

# Default user
users:
  - name: ubuntu
    groups: ["sudo", "adm", "video", "render"]
    shell: "/bin/bash"

# Cloud-init user data for DCV and MATLAB installation
user_data: |
  #cloud-config

  # Update system
  package_update: true
  package_upgrade: true

  # Install Nice DCV dependencies
  packages:
    - mesa-utils
    - ubuntu-mate-desktop
    - dbus-x11
    - lightdm
    - build-essential
    - libglu1-mesa
    - unzip
    - ca-certificates

  runcmd:
    # Download and install Nice DCV server
    - wget https://d1uj6qtbmh3dt5.cloudfront.net/nice-dcv-ubuntu2404-x86_64.tgz -O /tmp/nice-dcv.tgz
    - tar -xzf /tmp/nice-dcv.tgz -C /tmp
    - apt install -y /tmp/nice-dcv-*-ubuntu2404-x86_64/*.deb

    # Download and install MATLAB (silent installation)
    # Note: This downloads the installer; actual MATLAB files downloaded during installation
    - |
      mkdir -p /tmp/matlab_installer
      cd /tmp/matlab_installer

      # Download MATLAB installer for Linux
      wget -O matlab_installer.zip "https://www.mathworks.com/mwdownloads/mpm/glnxa64/mpm"
      chmod +x mpm

      # Silent installation using MATLAB Package Manager (mpm)
      # Install MATLAB without activation (user activates on first launch)
      ./mpm install \
        --release=R2024b \
        --destination=/usr/local/MATLAB/R2024b \
        --products MATLAB

    # Configure DCV server
    - |
      cat > /etc/dcv/dcv.conf <<'EOF'
      [license]
      [log]
      level="info"
      [session-management]
      create-session = true
      [session-management/defaults]
      [session-management/automatic-console-session]
      owner="ubuntu"
      [display]
      use-gl-in-virtual-sessions = true
      [connectivity]
      enable-quic-frontend=true
      [security]
      authentication="system"
      EOF

    # Set password for ubuntu user (users should change this)
    - echo "ubuntu:ChangeMe123!" | chpasswd

    # Configure LightDM for automatic login
    - |
      cat > /etc/lightdm/lightdm.conf.d/50-dcv.conf <<'EOF'
      [Seat:*]
      autologin-user=ubuntu
      autologin-user-timeout=0
      EOF

    # Enable and start DCV server
    - systemctl enable dcvserver
    - systemctl start dcvserver

    # Create initial DCV session
    - sleep 10
    - sudo -u ubuntu dcv create-session --type=virtual --owner ubuntu --gl on my-session

    # Create MATLAB desktop shortcut
    - |
      cat > /usr/share/applications/matlab.desktop <<'EOF'
      [Desktop Entry]
      Version=1.0
      Type=Application
      Name=MATLAB R2024b
      Comment=Technical Computing Environment
      Exec=/usr/local/MATLAB/R2024b/bin/matlab -desktop
      Icon=/usr/local/MATLAB/R2024b/bin/glnxa64/cef_resources/matlab_icon.png
      Terminal=false
      Categories=Development;Science;Math;
      EOF

      # Copy to desktop for easy access
      mkdir -p /home/ubuntu/Desktop
      cp /usr/share/applications/matlab.desktop /home/ubuntu/Desktop/
      chmod +x /home/ubuntu/Desktop/matlab.desktop
      chown ubuntu:ubuntu /home/ubuntu/Desktop/matlab.desktop

    # Create MATLAB workspace structure
    - |
      mkdir -p /home/ubuntu/Desktop
      mkdir -p /home/ubuntu/MATLAB-Projects
      mkdir -p /home/ubuntu/MATLAB-Data
      mkdir -p /home/ubuntu/MATLAB-Scripts
      mkdir -p /home/ubuntu/MATLAB-Models

      cat > /home/ubuntu/Desktop/MATLAB-Quick-Start.txt <<'EOF'
      MATLAB Desktop - Quick Start Guide
      ===================================

      ✅ MATLAB R2024b is installed and ready to use!

      🚀 Getting Started (First Time):

      1. Launch MATLAB:
         - Double-click MATLAB icon on desktop
         - Or run: /usr/local/MATLAB/R2024b/bin/matlab

      2. Activate Your License (First Launch):

         Option A: Cloud License (Recommended)
         -------------------------------------
         When MATLAB starts, it will prompt you to sign in:
         - Click "Sign in to your MathWorks Account"
         - Enter your MathWorks credentials
         - MATLAB will automatically activate with your online license
         - No additional configuration needed!

         Option B: License File (.lic)
         ------------------------------
         If you have a license file:
         - When prompted, select "Enter a License File"
         - Browse to your .lic file location
         - MATLAB will activate using the license file

         Option C: Network License Server
         ---------------------------------
         For institutional network licenses:
         - Copy your network.lic file to: /usr/local/MATLAB/R2024b/licenses/
         - File format:
           SERVER license-server.edu 27000
           USE_SERVER
         - Launch MATLAB

      3. Verify Installation:
         >> ver  % Show MATLAB version and installed toolboxes
         >> license  % Show license information

      📡 Connection:
      From local: prism connect <instance-name>

      🔢 MATLAB Quick Start (Once Installed):

      1. Launch MATLAB:
         /usr/local/MATLAB/R2024b/bin/matlab
         Or: Click MATLAB icon on desktop

      2. Verify Installation:
         >> ver  % Show installed toolboxes
         >> license  % Show license info

      3. Set Path (if needed):
         >> addpath('/home/ubuntu/MATLAB-Scripts')
         >> savepath

      📂 Workspace Structure:
      - ~/MATLAB-Projects/ - Project files (.prj)
      - ~/MATLAB-Data/ - Data files (.mat, .csv, etc.)
      - ~/MATLAB-Scripts/ - MATLAB scripts (.m files)
      - ~/MATLAB-Models/ - Simulink models (.slx)

      💡 Essential MATLAB Commands:

      Workspace Management:
      >> clear         % Clear workspace
      >> clc           % Clear command window
      >> close all     % Close all figures

      Help and Documentation:
      >> help function_name
      >> doc function_name
      >> lookfor keyword

      Data Import/Export:
      >> load('data.mat')
      >> save('results.mat', 'variable')
      >> data = readtable('data.csv')

      Plotting:
      >> plot(x, y)
      >> surf(X, Y, Z)
      >> histogram(data)

      Parallel Computing:
      >> parpool(4)  % Start parallel pool with 4 workers
      >> parfor i = 1:n
           % Parallel loop
         end

      🔧 Recommended Toolboxes:

      Essential:
      - Statistics and Machine Learning Toolbox
      - Optimization Toolbox
      - Curve Fitting Toolbox

      Data Science:
      - Deep Learning Toolbox
      - Parallel Computing Toolbox
      - Database Toolbox

      Engineering:
      - Signal Processing Toolbox
      - Image Processing Toolbox
      - Control System Toolbox
      - Simulink (model-based design)

      🎓 Learning Resources:

      Getting Started:
      - MATLAB Onramp: https://www.mathworks.com/learn/tutorials/matlab-onramp.html
      - MATLAB Documentation: https://www.mathworks.com/help/matlab/

      Video Tutorials:
      - MATLAB Tech Talks: https://www.mathworks.com/videos/tech-talks.html
      - YouTube: MATLAB channel

      Community:
      - MATLAB Central: https://www.mathworks.com/matlabcentral/
      - File Exchange: Free MATLAB code and apps

      💰 License Options:

      Academic:
      - Check if your institution has Campus-Wide License
      - Student licenses available at discounted rates
      - Contact: https://www.mathworks.com/academia.html

      Individual:
      - Home license: ~$150/year
      - Professional license: ~$800/year
      - Trial: 30-day free trial available

      🔑 Security:
      Change password immediately: passwd

      📚 Support:
      - MATLAB Answers: https://www.mathworks.com/matlabcentral/answers/
      - Prism support: https://github.com/scttfrdmn/prism/issues

      ⚠️  Important Notes:
      - MATLAB installation is ~20GB
      - Installation time: ~15 minutes
      - Requires valid MathWorks license
      - GPU support available with Parallel Computing Toolbox
      EOF

      # Create sample MATLAB script
      cat > /home/ubuntu/MATLAB-Scripts/sample_analysis.m <<'EOF'
      % Sample MATLAB Analysis Script
      % Demonstrates basic MATLAB functionality

      % Clear workspace
      clear; clc; close all;

      % Generate sample data
      x = linspace(0, 2*pi, 100);
      y = sin(x) + 0.1*randn(size(x));

      % Create figure
      figure('Name', 'Sample Analysis');

      % Plot data
      subplot(2,1,1);
      plot(x, y, 'b.', 'MarkerSize', 10);
      hold on;
      plot(x, sin(x), 'r-', 'LineWidth', 2);
      xlabel('x');
      ylabel('y');
      title('Sample Data with Noise');
      legend('Noisy Data', 'True Function');
      grid on;

      % Histogram
      subplot(2,1,2);
      histogram(y - sin(x), 20);
      xlabel('Residuals');
      ylabel('Frequency');
      title('Noise Distribution');
      grid on;

      % Save results
      save('sample_results.mat', 'x', 'y');
      fprintf('Analysis complete! Results saved to sample_results.mat\n');
      EOF

      chown -R ubuntu:ubuntu /home/ubuntu/Desktop
      chown -R ubuntu:ubuntu /home/ubuntu/MATLAB-*

    # Clean up
    - rm -rf /tmp/nice-dcv*

