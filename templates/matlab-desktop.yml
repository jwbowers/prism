# Idle detection configuration (aggressive for expensive instance)
idle_detection:
  enabled: true
  idle_threshold_minutes: 45     # MATLAB sessions can be long
  hibernate_threshold_minutes: 120 # Preserve workspace
  check_interval_minutes: 5
  detection_method: "composite"   # Check CPU, memory, network, disk

# Instance defaults optimized for MATLAB
instance_defaults:
  type: "t3.xlarge"  # 4 vCPU, 16 GB RAM - good for MATLAB
  ports: [22]        # SSH for SSM only, DCV tunneled
  estimated_cost_per_hour:
    x86_64: 0.1856    # t3.xlarge hourly rate
    arm64: 0.1472     # t4g.xlarge hourly rate (if ARM - MATLAB ARM support limited)

# Resource recommendations
recommended_sizes:
  - size: "L"
    instance_type: "t3.large"
    vcpu: 2
    memory: 8
    use_case: "Light MATLAB work, small datasets"
    cost_per_hour: 0.0928

  - size: "XL"
    instance_type: "t3.xlarge"
    vcpu: 4
    memory: 16
    use_case: "Standard MATLAB workflows (recommended)"
    cost_per_hour: 0.1856

  - size: "2XL"
    instance_type: "t3.2xlarge"
    vcpu: 8
    memory: 32
    use_case: "Large datasets, parallel computing"
    cost_per_hour: 0.3712

  - size: "GPU"
    instance_type: "g4dn.xlarge"
    vcpu: 4
    memory: 16
    gpu: "NVIDIA T4 (16GB)"
    use_case: "GPU-accelerated computing with Parallel Computing Toolbox"
    cost_per_hour: 0.526

# User guidance
estimated_launch_time: 20  # Minutes - DCV + MATLAB installation (manual)
prerequisites:
  - "Valid MATLAB license (individual, academic, or network)"
  - "MathWorks account (for online installation)"
  - "MATLAB programming knowledge"
  - "AWS CLI installed locally (for SSM)"
  - "Modern web browser"

learning_resources:
  - "https://www.mathworks.com/help/matlab/"
  - "https://www.mathworks.com/learn/tutorials/matlab-onramp.html"
  - "https://www.mathworks.com/matlabcentral/"
  - "https://www.mathworks.com/pricing-licensing.html"
  - "https://www.mathworks.com/academia.html"
  - "https://docs.aws.amazon.com/dcv/latest/userguide/"
  - "https://github.com/scttfrdmn/prism/blob/main/docs/architecture/NICE_DCV_ARCHITECTURE.md"

# Template metadata
version: "1.0.0"
validation_status: "validated"  # Automated MATLAB installation with cloud licensing
maintainer: "Prism Team"
tags:
  desktop: "mate"
  remote_desktop: "nice-dcv"
  connection_type: "desktop"
  matlab: "true"
  numerical_computing: "true"
  commercial: "true"
  license_required: "true"
  simulink: "true"

# Advanced options
advanced_options:
  gpu_acceleration: false  # Can enable for Parallel Computing Toolbox
  audio_support: false
  usb_redirection: false
  multi_monitor: true

# Commercial software notes
commercial_software:
  vendor: "MathWorks"
  license_required: true
  license_types:
    - online
    - network
    - marketplace
  acquisition_info: "https://www.mathworks.com/pricing-licensing.html"
  installation_size_gb: 20
  installation_time_minutes: 15
