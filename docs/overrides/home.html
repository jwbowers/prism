{% extends "main.html" %}

{% block tabs %}
  {{ super() }}
{% endblock %}

{% block content %}
<style>
  .md-content__inner { padding: 0; max-width: 100%; }
  .md-content__inner > h1:first-child { display: none; }

  .hero {
    background: linear-gradient(135deg, #0f0c2e 0%, #1a1060 40%, #1a3a6e 100%);
    color: #fff;
    padding: 6rem 2rem 5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 60%, rgba(90,79,207,0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 30%, rgba(52,152,219,0.3) 0%, transparent 60%);
  }
  .hero-inner { position: relative; max-width: 760px; margin: 0 auto; }
  .hero-icon { width: 90px; height: 90px; object-fit: contain; margin-bottom: 1.5rem; filter: drop-shadow(0 0 30px rgba(120,100,255,0.6)); }
  .hero h1 { font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 800; line-height: 1.15; margin-bottom: 1rem; color: #fff; letter-spacing: -0.02em; }
  .hero-gradient { background: linear-gradient(90deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .hero-sub { font-size: 1.15rem; color: rgba(255,255,255,0.75); max-width: 560px; margin: 0 auto 2.5rem; }
  .hero-buttons { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem; }
  .btn-hero-primary { background: #fff; color: #5a4fcf; padding: 12px 28px; border-radius: 8px; font-weight: 700; font-size: 1rem; text-decoration: none; box-shadow: 0 2px 12px rgba(0,0,0,0.3); transition: transform 0.15s; }
  .btn-hero-primary:hover { transform: translateY(-2px); color: #3d35a8; text-decoration: none; }
  .btn-hero-secondary { background: rgba(255,255,255,0.12); color: #fff; padding: 12px 28px; border-radius: 8px; font-weight: 600; font-size: 1rem; border: 1px solid rgba(255,255,255,0.25); text-decoration: none; transition: background 0.15s; }
  .btn-hero-secondary:hover { background: rgba(255,255,255,0.2); text-decoration: none; color: #fff; }
  .install-block { display: inline-flex; align-items: center; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 12px 24px; }
  .install-block code { font-family: "SF Mono", "Fira Code", monospace; font-size: 0.95rem; color: rgba(255,255,255,0.9); background: none; }

  .features-section { padding: 5rem 2rem; background: var(--md-default-bg-color); }
  .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); gap: 1.5rem; max-width: 1100px; margin: 0 auto; }
  .feature-card { background: var(--md-code-bg-color); border: 1px solid var(--md-default-fg-color--lightest); border-radius: 10px; padding: 1.75rem; }
  .feature-icon { font-size: 1.8rem; display: block; margin-bottom: 0.75rem; }
  .feature-card h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.5rem; margin-top: 0; }
  .feature-card p { font-size: 0.9rem; color: var(--md-default-fg-color--light); margin: 0; line-height: 1.6; }

  .quick-start-section { padding: 5rem 2rem; background: var(--md-code-bg-color); text-align: center; }
  .quick-start-section h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 2rem; }
  .quick-start-section .highlight { max-width: 680px; margin: 0 auto 1.5rem; text-align: left; }
  .quick-start-links { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; margin-top: 1.5rem; font-size: 0.95rem; }
  .quick-start-links a { color: var(--md-primary-fg-color); font-weight: 600; }

  .templates-section { padding: 5rem 2rem; background: var(--md-default-bg-color); }
  .templates-section h2 { font-size: 1.8rem; font-weight: 800; text-align: center; margin-bottom: 2.5rem; }
  .templates-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 1rem; max-width: 1100px; margin: 0 auto; }
  .template-card { background: var(--md-code-bg-color); border: 1px solid var(--md-default-fg-color--lightest); border-radius: 10px; padding: 1.25rem; display: flex; align-items: flex-start; gap: 0.75rem; }
  .template-card span { font-size: 1.4rem; flex-shrink: 0; }
  .template-card strong { font-size: 0.9rem; display: block; margin-bottom: 0.2rem; }
  .template-card div { font-size: 0.82rem; color: var(--md-default-fg-color--light); }

  .downloads-section { padding: 5rem 2rem; background: var(--md-code-bg-color); text-align: center; }
  .downloads-section h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 2.5rem; }
  .downloads-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 1rem; max-width: 900px; margin: 0 auto 1.5rem; }
  .download-card { background: var(--md-default-bg-color); border: 1px solid var(--md-default-fg-color--lightest); border-radius: 10px; padding: 1.5rem; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
  .download-card strong { font-size: 0.95rem; }
  .btn-download { background: var(--md-primary-fg-color); color: var(--md-primary-bg-color); padding: 8px 20px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; text-decoration: none; }
  .btn-download:hover { text-decoration: none; opacity: 0.9; }
  .downloads-note { font-size: 0.88rem; color: var(--md-default-fg-color--light); margin-top: 0.5rem; }
</style>

{{ page.content }}
{% endblock %}
